<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ baby_name }}的成长记录 - 家庭码验证</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/bootstrap/bootstrap-5.3.0.min.css') }}">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f7b267 0%, #f4845f 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        .family-card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.18);
            padding: 28px;
        }
        .family-title {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #2d2d2d;
        }
        .family-subtitle {
            color: #666;
            margin-bottom: 18px;
            font-size: 0.95rem;
        }
        .btn-verify {
            width: 100%;
            border: none;
            border-radius: 10px;
            padding: 12px 14px;
            background: linear-gradient(135deg, #ff7a59 0%, #ff9f68 100%);
            color: #fff;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="family-card">
        <div class="family-title">👶 {{ baby_name }}的成长记录</div>
        <div class="family-subtitle">请输入家庭码后继续访问。首次验证成功后会自动记住。</div>

        <form id="familyAccessForm">
            <div class="mb-3">
                <label for="familyCode" class="form-label">家庭码</label>
                <input type="password" id="familyCode" class="form-control form-control-lg" placeholder="请输入家庭码" required autofocus>
            </div>
            <div id="errorMsg" class="alert alert-danger d-none py-2"></div>
            <button class="btn-verify" type="submit">进入</button>
        </form>
    </div>

    <script>
        const NEXT_URL = {{ next_url|tojson }};

        document.getElementById('familyAccessForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const code = document.getElementById('familyCode').value || '';
            const errorMsg = document.getElementById('errorMsg');

            fetch('/api/family-access', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    family_code: code,
                    next: NEXT_URL
                })
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data && data.success) {
                    window.location.href = data.next || NEXT_URL || '/';
                    return;
                }
                errorMsg.textContent = (data && data.message) || '家庭码错误';
                errorMsg.classList.remove('d-none');
            })
            .catch(function() {
                errorMsg.textContent = '验证失败，请稍后重试';
                errorMsg.classList.remove('d-none');
            });
        });
    </script>
</body>
</html>
