<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ baby_name }}的成长记录 - 家庭码验证</title>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f7b267 0%, #f4845f 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        .family-card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.18);
            padding: 28px;
        }
        .family-title {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #2d2d2d;
        }
        .family-subtitle {
            color: #666;
            margin-bottom: 18px;
            font-size: 0.95rem;
        }
        .btn-verify {
            width: 100%;
            border: none;
            border-radius: 10px;
            padding: 12px 14px;
            background: linear-gradient(135deg, #ff7a59 0%, #ff9f68 100%);
            color: #fff;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
        }
        .form-row {
            margin-bottom: 16px;
        }
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.95rem;
            color: #444;
            font-weight: 600;
        }
        .form-control {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #d7d7d7;
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 1rem;
            line-height: 1.4;
            background: #fff;
            outline: none;
        }
        .form-control:focus {
            border-color: #ff9f68;
            box-shadow: 0 0 0 3px rgba(255, 159, 104, 0.18);
        }
        .error-msg {
            display: none;
            margin-bottom: 14px;
            padding: 10px 12px;
            border-radius: 10px;
            background: #fff1f0;
            color: #b42318;
            font-size: 0.92rem;
        }
        .error-msg.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="family-card">
        <div class="family-title">👶 {{ baby_name }}的成长记录</div>
        <div class="family-subtitle">请输入家庭码后继续访问。首次验证成功后会自动记住。</div>

        <form id="familyAccessForm">
            <div class="form-row">
                <label for="familyCode" class="form-label">家庭码</label>
                <input type="password" id="familyCode" class="form-control" placeholder="请输入家庭码" required autofocus>
            </div>
            <div id="errorMsg" class="error-msg"></div>
            <button class="btn-verify" type="submit">进入</button>
        </form>
    </div>

    <script>
        const NEXT_URL = {{ next_url|tojson }};

        document.getElementById('familyAccessForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const code = document.getElementById('familyCode').value || '';
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.classList.remove('show');

            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/family-access', true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onreadystatechange = function() {
                if (xhr.readyState !== 4) {
                    return;
                }

                var data = null;
                try {
                    data = JSON.parse(xhr.responseText || '{}');
                } catch (error) {
                    data = null;
                }

                if (xhr.status >= 200 && xhr.status < 300 && data && data.success) {
                    window.location.href = data.next || NEXT_URL || '/';
                    return;
                }

                errorMsg.textContent = (data && data.message) || '验证失败，请稍后重试';
                errorMsg.classList.add('show');
            };
            xhr.onerror = function() {
                errorMsg.textContent = '验证失败，请稍后重试';
                errorMsg.classList.add('show');
            };
            xhr.send(JSON.stringify({
                family_code: code,
                next: NEXT_URL
            }));
        });
    </script>
</body>
</html>
