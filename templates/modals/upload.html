<!-- 上传模态框 -->
<div class="modal fade" id="uploadModal" tabindex="-1" aria-labelledby="uploadModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="uploadModalLabel">
                    <i class="fas fa-cloud-upload-alt me-2"></i>上传照片/视频
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="upload-area" id="dropZone">
                    <div class="text-center py-5">
                        <i class="fas fa-cloud-upload-alt fa-4x text-primary mb-3"></i>
                        <h4>上传照片/视频</h4>
                        <p class="text-muted mb-1" id="uploadHint">支持多选后上传</p>
                        <input type="file" id="fileInput" multiple accept="image/*,video/*" style="display: none;">
                        <input type="file" id="cameraInput" accept="image/*,video/*" capture="environment" style="display: none;">
                        <button class="btn btn-primary btn-lg" onclick="triggerNativeFileSelect()">
                            <i class="fas fa-images me-2"></i>选择照片/视频
                        </button>
                        <div class="small text-muted mt-2" id="uploadCapabilityHint">如相册没直接进入多选，先长按一张。</div>
                        {% if android_companion_apk_available %}
                        <div class="small mt-2" id="uploadApkHint">
                            <span class="text-muted">vivo、OPPO、部分华为可直接安装 </span>
                            <a href="{{ android_companion_apk_url }}" class="fw-semibold">mumu成长助手 APK</a>
                            <span class="text-muted"> 批量上传。</span>
                        </div>
                        {% endif %}
                        <div id="mobileUploadAssist" class="d-none mt-3">
                            <div class="d-flex flex-wrap justify-content-center gap-2">
                                <button type="button" class="btn btn-outline-primary" onclick="triggerMobileGalleryPicker()">
                                    <i class="fas fa-images me-1"></i>从相册导入
                                </button>
                                <button type="button" class="btn btn-outline-success" onclick="triggerMobileCameraPicker()">
                                    <i class="fas fa-camera me-1"></i>直接拍照/录像
                                </button>
                                <button type="button" class="btn btn-outline-dark d-none" id="advancedPickerBtn" onclick="tryAdvancedPickerFromUi()">
                                    <i class="fas fa-layer-group me-1"></i>尝试另一种选择器
                                </button>
                            </div>
                            <div class="small text-muted mt-2" id="mobileUploadAssistHint">
                                手机上会先尽量自动打开系统选择器；如果被拦截，再手动点上面的按钮。
                            </div>
                        </div>
                        <p class="text-muted mt-3 mb-0">
                            <small>支持：JPG, PNG, GIF, WebP, MP4, MOV</small>
                        </p>
                    </div>
                </div>
                
                <!-- 预览区域 -->
                <div id="previewArea" class="mt-4" style="display: none;">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h6 class="mb-0">已选择 <span id="fileCount">0</span> 个文件</h6>
                    </div>
                    <div class="row" id="previewGrid"></div>
                </div>
                
                <!-- 上传进度 -->
                <div id="uploadProgress" class="mt-4" style="display: none;">
                    <div class="progress mb-2" style="height: 20px;">
                        <div class="progress-bar progress-bar-striped progress-bar-animated" 
                             role="progressbar" style="width: 0%"></div>
                    </div>
                    <div class="d-flex justify-content-between text-muted small mb-1">
                        <span id="uploadSizeInfo">0 KB / 0 KB</span>
                        <span id="uploadSpeedInfo">-- KB/s</span>
                    </div>
                    <p class="text-center mt-2" id="uploadStatus">正在上传...</p>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="uploadBtn" onclick="uploadFiles()" disabled>
                    <i class="fas fa-upload me-2"></i>开始上传
                </button>
            </div>
        </div>
    </div>
</div>

<style>
.upload-area {
    border: 2px dashed #dee2e6;
    border-radius: 12px;
    transition: all 0.3s ease;
}

.upload-area:hover,
.upload-area.dragover {
    border-color: #0d6efd;
    background-color: #f8f9ff;
}

.upload-area i {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.preview-item {
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    background: #f8f9fa;
}

.preview-item img,
.preview-item video {
    width: 100%;
    height: 120px;
    object-fit: cover;
}

.preview-item .remove-btn {
    position: absolute;
    top: 5px;
    right: 5px;
    background: rgba(0, 0, 0, 0.5);
    color: white;
    border: none;
    border-radius: 50%;
    width: 24px;
    height: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

.preview-item.is-video::after {
    content: '\f144';
    font-family: 'Font Awesome 6 Free';
    font-weight: 900;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 2rem;
    color: white;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}
</style>

<script>
var selectedFiles = [];
var autoContinueMode = false;
var mobileUploadState = {
    isMobile: false,
    isLocalNetwork: false,
    autoPickerAttempted: false,
    isCompanionApp: false
};
var uploadCapabilityState = {
    advancedPickerAvailable: false
};

function refreshUploadCapabilities() {
    var ua = navigator.userAgent.toLowerCase();
    var problematicBrowsers = ['vivo', 'oppo', 'coloros', 'funtouch', 'ucbrowser', 'baidu', 'huawei'];
    var isProblematic = problematicBrowsers.some(function(b) { return ua.indexOf(b) !== -1; });
    var isAndroid = ua.indexOf('android') !== -1;
    var isIOS = /iphone|ipad|ipod/.test(ua);
    var isCompanionApp = ua.indexOf('mumucompanion') !== -1;
    uploadCapabilityState.advancedPickerAvailable =
        typeof window.canUseAdvancedOpenPicker === 'function' && window.canUseAdvancedOpenPicker();

    autoContinueMode = !isCompanionApp && (isProblematic || (isAndroid && !uploadCapabilityState.advancedPickerAvailable));

    var hint = document.getElementById('uploadHint');
    var capabilityHint = document.getElementById('uploadCapabilityHint');
    var advancedPickerBtn = document.getElementById('advancedPickerBtn');
    var apkHint = document.getElementById('uploadApkHint');
    if (hint) {
        if (isCompanionApp) {
            hint.textContent = '已进入 mumu成长助手，可直接批量上传';
        } else if (isIOS) {
            hint.textContent = 'iPhone 一般支持多选上传';
        } else if (autoContinueMode) {
            hint.textContent = '网页多选受限时，可安装 mumu成长助手 APK';
        } else {
            hint.textContent = '支持多选后上传';
        }
    }
    if (capabilityHint) {
        if (isCompanionApp) {
            capabilityHint.textContent = '如相册没直接进入多选，先长按一张。';
        } else if (isIOS) {
            capabilityHint.textContent = '如未进入多选，请改从照片图库选择。';
        } else if (uploadCapabilityState.advancedPickerAvailable) {
            capabilityHint.textContent = '如系统相册异常，可试另一种选择器。';
        } else {
            capabilityHint.textContent = '如相册没直接进入多选，先长按一张。';
        }
    }
    if (advancedPickerBtn) {
        advancedPickerBtn.classList.toggle('d-none', isCompanionApp || !uploadCapabilityState.advancedPickerAvailable);
    }
    if (apkHint) {
        apkHint.classList.toggle('d-none', isCompanionApp || isIOS || !isAndroid);
    }
}

document.getElementById('fileInput').addEventListener('change', handleFileSelect);
document.getElementById('cameraInput').addEventListener('change', handleFileSelect);

function detectMobileUploadContext() {
    var ua = navigator.userAgent || '';
    mobileUploadState.isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(ua);
    mobileUploadState.isCompanionApp = /mumucompanion/i.test(ua);
    var isIOS = /iPhone|iPad|iPod/i.test(ua);
    var host = window.location.hostname || '';
    mobileUploadState.isLocalNetwork =
        host === 'localhost' ||
        host === '127.0.0.1' ||
        /^10\./.test(host) ||
        /^192\.168\./.test(host) ||
        /^172\.(1[6-9]|2\d|3[0-1])\./.test(host);

    var assist = document.getElementById('mobileUploadAssist');
    if (!assist) return;
    if (mobileUploadState.isMobile && mobileUploadState.isLocalNetwork) {
        assist.classList.remove('d-none');
    } else {
        assist.classList.add('d-none');
    }

    var mobileHint = document.getElementById('mobileUploadAssistHint');
    if (mobileHint) {
        mobileHint.textContent = mobileUploadState.isCompanionApp
            ? '如相册没直接进入多选，先长按一张。'
            : isIOS
                ? 'iPhone 建议从照片图库选择。'
                : '点上面的按钮即可。';
    }

    var androidCompanionAssist = document.getElementById('androidCompanionAssist');
    if (androidCompanionAssist) {
        if (mobileUploadState.isMobile && !mobileUploadState.isCompanionApp) {
            androidCompanionAssist.classList.remove('d-none');
        } else {
            androidCompanionAssist.classList.add('d-none');
        }
    }
    refreshUploadCapabilities();
}

async function openAdvancedFilePicker() {
    var handles = await window.showOpenFilePicker({
        multiple: true,
        excludeAcceptAllOption: false,
        types: [
            {
                description: '照片和视频',
                accept: {
                    'image/*': ['.jpg', '.jpeg', '.png', '.gif', '.webp', '.heic', '.heif'],
                    'video/*': ['.mp4', '.mov', '.m4v', '.avi', '.mkv', '.3gp', '.webm']
                }
            }
        ]
    });
    var files = [];
    for (var i = 0; i < handles.length; i += 1) {
        files.push(await handles[i].getFile());
    }
    if (files.length > 0) {
        addFilesToSelection(files);
    }
    return files.length > 0;
}

async function openBestFilePicker() {
    if (uploadCapabilityState.advancedPickerAvailable) {
        try {
            var picked = await openAdvancedFilePicker();
            if (picked) {
                return true;
            }
        } catch (error) {
            if (error && error.name === 'AbortError') {
                return false;
            }
            console.warn('高级多选通道失败，回退普通选择器:', error);
        }
    }
    document.getElementById('fileInput').click();
    return true;
}

function triggerNativeFileSelect() {
    document.getElementById('fileInput').click();
}

function tryAdvancedPickerFromUi() {
    openBestFilePicker().catch(function(error) {
        console.warn('尝试另一种选择器失败:', error);
        if (typeof showNotification === 'function') {
            showNotification('另一种选择器未成功打开，已保留原生选择方式。', 'warning', 3500);
        }
    });
}

function triggerMobileGalleryPicker() {
    triggerNativeFileSelect();
}

function triggerMobileCameraPicker() {
    document.getElementById('cameraInput').click();
}

function tryAutoOpenMobilePicker(force) {
    if (!(mobileUploadState.isMobile && mobileUploadState.isLocalNetwork)) {
        return false;
    }
    if (mobileUploadState.autoPickerAttempted && !force) {
        return false;
    }
    mobileUploadState.autoPickerAttempted = true;
    try {
        triggerNativeFileSelect();
    } catch (error) {
        var hint = document.getElementById('mobileUploadAssistHint');
        if (hint) {
            hint.textContent = mobileUploadState.isCompanionApp
                ? '当前系统没有直接拉起选择器，请手动点“从相册导入”或“直接拍照/录像”。'
                : '当前手机浏览器拦截了自动拉起，请改点“从相册导入”或“直接拍照/录像”。';
        }
        console.warn('自动拉起选择器失败:', error);
    }
    return true;
}

function handleFileSelect(event) {
    var files = event.target.files;
    if (files.length > 0) {
        addFilesToSelection(files);
    }
    event.target.value = '';
    
    // 如果是不支持多选的设备，显示快速选择提示
    if (autoContinueMode && selectedFiles.length > 0) {
        showQuickAddBar();
    }
}

function showQuickAddBar() {
    var previewArea = document.getElementById('previewArea');
    var quickBar = document.getElementById('quickAddBar');
    
    if (!quickBar) {
        quickBar = document.createElement('div');
        quickBar.id = 'quickAddBar';
        quickBar.className = 'position-fixed bottom-0 start-0 end-0 p-3 bg-white border-top shadow-lg';
        quickBar.style.cssText = 'z-index: 1060;';
        quickBar.innerHTML = '<div class="d-flex justify-content-center align-items-center gap-3"><button class="btn btn-outline-secondary" onclick="clearSelectedFiles(); hideQuickAddBar();"><i class="fas fa-trash me-1"></i>清空</button><button class="btn btn-primary btn-lg px-4" onclick="triggerFileSelect()"><i class="fas fa-plus me-1"></i>继续添加</button><button class="btn btn-success btn-lg px-4" onclick="startUpload()"><i class="fas fa-upload me-1"></i>上传 (' + selectedFiles.length + '项)</button></div>';
        document.body.appendChild(quickBar);
    } else {
        // 更新数量
        var uploadBtn = quickBar.querySelector('.btn-success');
        if (uploadBtn) {
            uploadBtn.innerHTML = '<i class="fas fa-upload me-1"></i>上传 (' + selectedFiles.length + '项)';
        }
        quickBar.style.display = 'block';
    }
}

function hideQuickAddBar() {
    var quickBar = document.getElementById('quickAddBar');
    if (quickBar) {
        quickBar.style.display = 'none';
    }
}

function triggerFileSelect() {
    triggerNativeFileSelect();
}

function startUpload() {
    hideQuickAddBar();
    uploadFiles();
}

function addFilesToSelection(files) {
    var newFiles = Array.from(files);
    
    newFiles.forEach(function(file) {
        var isDuplicate = selectedFiles.some(function(f) { 
            return f.name === file.name && f.size === file.size;
        });
        if (!isDuplicate) {
            selectedFiles.push(file);
        }
    });
    
    updatePreview();
}

function updatePreview() {
    var previewArea = document.getElementById('previewArea');
    var previewGrid = document.getElementById('previewGrid');
    var uploadBtn = document.getElementById('uploadBtn');
    var fileCount = document.getElementById('fileCount');
    
    previewGrid.innerHTML = '';
    
    if (selectedFiles.length === 0) {
        previewArea.style.display = 'none';
        uploadBtn.disabled = true;
        hideQuickAddBar();
        return;
    }
    
    selectedFiles.forEach(function(file, index) {
        var col = document.createElement('div');
        col.className = 'col-md-3 col-6 mb-2';
        
        var previewItem = document.createElement('div');
        previewItem.className = 'preview-item';
        
        if (file.type.indexOf('video/') === 0) {
            previewItem.classList.add('is-video');
            var video = document.createElement('video');
            video.src = URL.createObjectURL(file);
            video.muted = true;
            previewItem.appendChild(video);
        } else {
            var img = document.createElement('img');
            img.src = URL.createObjectURL(file);
            previewItem.appendChild(img);
        }
        
        var removeBtn = document.createElement('button');
        removeBtn.className = 'remove-btn';
        removeBtn.innerHTML = '<i class="fas fa-times"></i>';
        removeBtn.onclick = function(e) {
            e.preventDefault();
            selectedFiles.splice(index, 1);
            updatePreview();
        };
        previewItem.appendChild(removeBtn);
        
        col.appendChild(previewItem);
        previewGrid.appendChild(col);
    });
    
    if (fileCount) fileCount.textContent = selectedFiles.length;
    previewArea.style.display = 'block';
    uploadBtn.disabled = false;
}

function addMoreFiles() {
    triggerNativeFileSelect();
}

function clearSelectedFiles() {
    selectedFiles = [];
    document.getElementById('fileInput').value = '';
    document.getElementById('previewArea').style.display = 'none';
    document.getElementById('uploadBtn').disabled = true;
    hideQuickAddBar();
}

// 拖拽上传
var dropZone = document.getElementById('dropZone');

dropZone.addEventListener('dragover', function(e) {
    e.preventDefault();
    this.classList.add('dragover');
});

dropZone.addEventListener('dragleave', function(e) {
    e.preventDefault();
    this.classList.remove('dragover');
});

dropZone.addEventListener('drop', function(e) {
    e.preventDefault();
    this.classList.remove('dragover');
    
    var files = e.dataTransfer.files;
    if (files.length > 0) {
        addFilesToSelection(files);
    }
});

function previewFiles(files) {
    addFilesToSelection(files);
}

function uploadFiles() {
    if (selectedFiles.length === 0) return;
    
    var formData = new FormData();
    formData.append('caption', '');
    
    // 计算总大小
    var totalSize = 0;
    selectedFiles.forEach(function(file) {
        formData.append('files', file);
        totalSize += file.size;
    });
    
    var progressArea = document.getElementById('uploadProgress');
    var progressBar = progressArea.querySelector('.progress-bar');
    var statusText = document.getElementById('uploadStatus');
    var sizeInfo = document.getElementById('uploadSizeInfo');
    var speedInfo = document.getElementById('uploadSpeedInfo');
    var uploadBtn = document.getElementById('uploadBtn');
    
    progressArea.style.display = 'block';
    uploadBtn.disabled = true;
    
    // 初始化进度信息
    var startTime = Date.now();
    var lastLoaded = 0;
    var lastTime = startTime;
    
    sizeInfo.textContent = '0 KB / ' + formatSize(totalSize);
    speedInfo.textContent = '计算中...';
    statusText.textContent = '正在上传 ' + selectedFiles.length + ' 个文件...';
    
    var xhr = new XMLHttpRequest();
    
    // 进度事件
    xhr.upload.onprogress = function(e) {
        if (e.lengthComputable) {
            var percent = Math.round((e.loaded / e.total) * 100);
            progressBar.style.width = percent + '%';
            
            // 计算上传速度
            var now = Date.now();
            var timeDiff = (now - lastTime) / 1000;
            var bytesDiff = e.loaded - lastLoaded;
            
            if (timeDiff > 0.5) {
                var speed = bytesDiff / timeDiff;
                speedInfo.textContent = formatSize(speed) + '/s';
                lastLoaded = e.loaded;
                lastTime = now;
            }
            
            // 更新已上传大小
            sizeInfo.textContent = formatSize(e.loaded) + ' / ' + formatSize(e.total);
            
            // 计算预计剩余时间
            var elapsed = (now - startTime) / 1000;
            if (elapsed > 1 && e.loaded > 0) {
                var avgSpeed = e.loaded / elapsed;
                var remaining = (e.total - e.loaded) / avgSpeed;
                if (remaining > 60) {
                    statusText.textContent = '上传中 ' + percent + '% · 预计剩余 ' + Math.round(remaining / 60) + ' 分钟';
                } else if (remaining > 1) {
                    statusText.textContent = '上传中 ' + percent + '% · 预计剩余 ' + Math.round(remaining) + ' 秒';
                } else {
                    statusText.textContent = '上传中 ' + percent + '%';
                }
            } else {
                statusText.textContent = '上传中 ' + percent + '%';
            }
        }
    };
    
    // 完成事件
    xhr.onload = function() {
        var data;
        try {
            data = JSON.parse(xhr.responseText);
        } catch (e) {
            data = { success: false, message: '解析响应失败' };
        }

        if (xhr.status === 200 && data && data.success) {
            progressBar.style.width = '100%';
            sizeInfo.textContent = formatSize(totalSize) + ' / ' + formatSize(totalSize);
            speedInfo.textContent = '完成';
            statusText.textContent = '上传完成！';
            showNotification(data.message || ('成功上传 ' + (data.count || 0) + ' 个文件'), 'success');

            var modalEl = document.getElementById('uploadModal');
            var modal = bootstrap.Modal.getInstance(modalEl);
            if (modal) {
                modal.hide();
            }

            // 重置表单
            document.getElementById('fileInput').value = '';
            document.getElementById('previewArea').style.display = 'none';
            document.getElementById('uploadProgress').style.display = 'none';
            document.getElementById('uploadBtn').disabled = true;
            selectedFiles = [];
            hideQuickAddBar();

            // 刷新当前日期数据
            setTimeout(function() {
                if (typeof loadDateData === 'function' && typeof window.currentCalendarDate !== 'undefined') {
                    loadDateData(formatDate(window.currentCalendarDate));
                } else {
                    window.location.reload();
                }
            }, 500);
        } else {
            showNotification('上传失败: ' + (data && data.message || ('HTTP错误 ' + xhr.status)), 'error');
            uploadBtn.disabled = false;
            progressArea.style.display = 'none';
        }
    };
    
    // 错误事件
    xhr.onerror = function() {
        console.error('上传错误');
        showNotification('上传出错，请稍后重试', 'error');
        uploadBtn.disabled = false;
        progressArea.style.display = 'none';
    };
    
    // 中止事件
    xhr.onabort = function() {
        showNotification('上传已取消', 'warning');
        uploadBtn.disabled = false;
        progressArea.style.display = 'none';
    };
    
    xhr.open('POST', '/upload', true);
    xhr.send(formData);
}

// 格式化文件大小
function formatSize(bytes) {
    if (bytes === 0) return '0 B';
    var k = 1024;
    var sizes = ['B', 'KB', 'MB', 'GB'];
    var i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
}

detectMobileUploadContext();

document.getElementById('uploadModal').addEventListener('shown.bs.modal', function () {
    detectMobileUploadContext();
    refreshUploadCapabilities();
    if (mobileUploadState.isMobile && mobileUploadState.isLocalNetwork && selectedFiles.length === 0) {
        setTimeout(function() {
            tryAutoOpenMobilePicker(false);
        }, 120);
    }
});
</script>
