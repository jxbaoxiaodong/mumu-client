<!-- 上传模态框 -->
<div class="modal fade" id="uploadModal" tabindex="-1" aria-labelledby="uploadModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="uploadModalLabel">
                    <i class="fas fa-cloud-upload-alt me-2"></i>上传照片/视频
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="upload-area" id="dropZone">
                    <div class="text-center py-5">
                        <i class="fas fa-cloud-upload-alt fa-4x text-primary mb-3"></i>
                        <h4>上传照片/视频</h4>
                        <p class="text-muted mb-1" id="uploadHint">支持多选后上传</p>
                        <input type="file" id="fileInput" multiple accept="image/*,video/*" style="display: none;">
                        <input type="file" id="cameraInput" accept="image/*,video/*" capture="environment" style="display: none;">
                        <button class="btn btn-primary btn-lg" onclick="triggerNativeFileSelect()">
                            <i class="fas fa-images me-2"></i>选择照片/视频
                        </button>
                        <div class="small text-muted mt-2" id="uploadCapabilityHint">如相册没直接进入多选，先长按一张。</div>
                        {% if android_companion_apk_available and not is_companion_app %}
                        <div class="small mt-2" id="uploadApkHint">
                            <a href="{{ android_companion_page_url }}" class="fw-semibold">打开专用app说明页</a>
                            <span class="text-muted"> 先看安装顺序，再装安卓伴侣。</span>
                        </div>
                        {% endif %}
                        <div id="mobileUploadAssist" class="d-none mt-3">
                            <div class="d-flex flex-wrap justify-content-center gap-2">
                                <button type="button" class="btn btn-outline-primary" onclick="triggerMobileGalleryPicker()">
                                    <i class="fas fa-images me-1"></i>从相册导入
                                </button>
                                <button type="button" class="btn btn-outline-success" onclick="triggerMobileCameraPicker()">
                                    <i class="fas fa-camera me-1"></i>直接拍照/录像
                                </button>
                                <button type="button" class="btn btn-outline-dark d-none" id="advancedPickerBtn" onclick="tryAdvancedPickerFromUi()">
                                    <i class="fas fa-layer-group me-1"></i>尝试另一种选择器
                                </button>
                            </div>
                            <div class="small text-muted mt-2" id="mobileUploadAssistHint">
                                手机上会先尽量自动打开系统选择器；如果被拦截，再手动点上面的按钮。
                            </div>
                        </div>
                        <p class="text-muted mt-3 mb-0">
                            <small>支持：JPG, PNG, GIF, WebP, MP4, MOV</small>
                        </p>
                    </div>
                </div>
                
                <!-- 预览区域 -->
                <div id="previewArea" class="mt-4" style="display: none;">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h6 class="mb-0">已选择 <span id="fileCount">0</span> 个文件</h6>
                    </div>
                    <div class="row" id="previewGrid"></div>
                </div>
                
                <!-- 上传进度 -->
                <div id="uploadProgress" class="mt-4" style="display: none;">
                    <div class="progress mb-2" style="height: 20px;">
                        <div class="progress-bar progress-bar-striped progress-bar-animated" 
                             role="progressbar" style="width: 0%"></div>
                    </div>
                    <div class="d-flex justify-content-between text-muted small mb-1">
                        <span id="uploadSizeInfo">0 KB / 0 KB</span>
                        <span id="uploadSpeedInfo">-- KB/s</span>
                    </div>
                    <p class="text-center mt-2" id="uploadStatus">正在上传...</p>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="uploadBtn" onclick="uploadFiles()" disabled>
                    <i class="fas fa-upload me-2"></i>开始上传
                </button>
            </div>
        </div>
    </div>
</div>

<style>
.upload-area {
    border: 2px dashed #dee2e6;
    border-radius: 12px;
    transition: all 0.3s ease;
}

.upload-area:hover,
.upload-area.dragover {
    border-color: #0d6efd;
    background-color: #f8f9ff;
}

.upload-area i {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.preview-item {
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    background: #f8f9fa;
}

.preview-item img,
.preview-item video {
    width: 100%;
    height: 120px;
    object-fit: cover;
}

.preview-item .remove-btn {
    position: absolute;
    top: 5px;
    right: 5px;
    background: rgba(0, 0, 0, 0.5);
    color: white;
    border: none;
    border-radius: 50%;
    width: 24px;
    height: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

.preview-item.is-video::after {
    content: '\f144';
    font-family: 'Font Awesome 6 Free';
    font-weight: 900;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 2rem;
    color: white;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}
</style>

<script>
var selectedFiles = [];
var autoContinueMode = false;
var uploadAbortController = null;
var mobileUploadState = {
    isMobile: false,
    isLocalNetwork: false,
    autoPickerAttempted: false,
    isCompanionApp: false
};
var uploadCapabilityState = {
    advancedPickerAvailable: false
};

function refreshUploadCapabilities() {
    var ua = navigator.userAgent.toLowerCase();
    var problematicBrowsers = ['vivo', 'oppo', 'coloros', 'funtouch', 'ucbrowser', 'baidu', 'huawei'];
    var isProblematic = problematicBrowsers.some(function(b) { return ua.indexOf(b) !== -1; });
    var isAndroid = ua.indexOf('android') !== -1;
    var isIOS = /iphone|ipad|ipod/.test(ua);
    var isCompanionApp = ua.indexOf('mumucompanion') !== -1;
    uploadCapabilityState.advancedPickerAvailable =
        typeof window.canUseAdvancedOpenPicker === 'function' && window.canUseAdvancedOpenPicker();

    autoContinueMode = !isCompanionApp && (isProblematic || (isAndroid && !uploadCapabilityState.advancedPickerAvailable));

    var hint = document.getElementById('uploadHint');
    var capabilityHint = document.getElementById('uploadCapabilityHint');
    var advancedPickerBtn = document.getElementById('advancedPickerBtn');
    var apkHint = document.getElementById('uploadApkHint');
    if (hint) {
        if (isCompanionApp) {
            hint.textContent = '已进入 mumu成长助手，可直接批量上传';
        } else if (isIOS) {
            hint.textContent = 'iPhone 一般支持多选上传';
        } else if (autoContinueMode) {
            hint.textContent = '网页多选受限时，可安装 mumu成长助手 APK';
        } else {
            hint.textContent = '支持多选后上传';
        }
    }
    if (capabilityHint) {
        if (isCompanionApp) {
            capabilityHint.textContent = '如相册没直接进入多选，先长按一张。';
        } else if (isIOS) {
            capabilityHint.textContent = '如未进入多选，请改从照片图库选择。';
        } else if (uploadCapabilityState.advancedPickerAvailable) {
            capabilityHint.textContent = '如系统相册异常，可试另一种选择器。';
        } else {
            capabilityHint.textContent = '如相册没直接进入多选，先长按一张。';
        }
    }
    if (advancedPickerBtn) {
        advancedPickerBtn.classList.toggle('d-none', isCompanionApp || !uploadCapabilityState.advancedPickerAvailable);
    }
    if (apkHint) {
        apkHint.classList.toggle('d-none', isCompanionApp || isIOS || !isAndroid);
    }
}

document.getElementById('fileInput').addEventListener('change', handleFileSelect);
document.getElementById('cameraInput').addEventListener('change', handleFileSelect);

function detectMobileUploadContext() {
    var ua = navigator.userAgent || '';
    mobileUploadState.isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(ua);
    mobileUploadState.isCompanionApp = /mumucompanion/i.test(ua);
    var isIOS = /iPhone|iPad|iPod/i.test(ua);
    var host = window.location.hostname || '';
    mobileUploadState.isLocalNetwork =
        host === 'localhost' ||
        host === '127.0.0.1' ||
        /^10\./.test(host) ||
        /^192\.168\./.test(host) ||
        /^172\.(1[6-9]|2\d|3[0-1])\./.test(host);

    var assist = document.getElementById('mobileUploadAssist');
    if (!assist) return;
    if (mobileUploadState.isMobile && mobileUploadState.isLocalNetwork) {
        assist.classList.remove('d-none');
    } else {
        assist.classList.add('d-none');
    }

    var mobileHint = document.getElementById('mobileUploadAssistHint');
    if (mobileHint) {
        mobileHint.textContent = mobileUploadState.isCompanionApp
            ? '如相册没直接进入多选，先长按一张。'
            : isIOS
                ? 'iPhone 建议从照片图库选择。'
                : '点上面的按钮即可。';
    }

    var androidCompanionAssist = document.getElementById('androidCompanionAssist');
    if (androidCompanionAssist) {
        if (mobileUploadState.isMobile && !mobileUploadState.isCompanionApp) {
            androidCompanionAssist.classList.remove('d-none');
        } else {
            androidCompanionAssist.classList.add('d-none');
        }
    }
    refreshUploadCapabilities();
}

async function openAdvancedFilePicker() {
    var handles = await window.showOpenFilePicker({
        multiple: true,
        excludeAcceptAllOption: false,
        types: [
            {
                description: '照片和视频',
                accept: {
                    'image/*': ['.jpg', '.jpeg', '.png', '.gif', '.webp', '.heic', '.heif'],
                    'video/*': ['.mp4', '.mov', '.m4v', '.avi', '.mkv', '.3gp', '.webm']
                }
            }
        ]
    });
    var files = [];
    for (var i = 0; i < handles.length; i += 1) {
        files.push(await handles[i].getFile());
    }
    if (files.length > 0) {
        addFilesToSelection(files);
    }
    return files.length > 0;
}

async function openBestFilePicker() {
    if (uploadCapabilityState.advancedPickerAvailable) {
        try {
            var picked = await openAdvancedFilePicker();
            if (picked) {
                return true;
            }
        } catch (error) {
            if (error && error.name === 'AbortError') {
                return false;
            }
            console.warn('高级多选通道失败，回退普通选择器:', error);
        }
    }
    document.getElementById('fileInput').click();
    return true;
}

function triggerNativeFileSelect() {
    document.getElementById('fileInput').click();
}

function tryAdvancedPickerFromUi() {
    openBestFilePicker().catch(function(error) {
        console.warn('尝试另一种选择器失败:', error);
        if (typeof showNotification === 'function') {
            showNotification('另一种选择器未成功打开，已保留原生选择方式。', 'warning', 3500);
        }
    });
}

function triggerMobileGalleryPicker() {
    triggerNativeFileSelect();
}

function triggerMobileCameraPicker() {
    document.getElementById('cameraInput').click();
}

function tryAutoOpenMobilePicker(force) {
    if (!(mobileUploadState.isMobile && mobileUploadState.isLocalNetwork)) {
        return false;
    }
    if (mobileUploadState.autoPickerAttempted && !force) {
        return false;
    }
    mobileUploadState.autoPickerAttempted = true;
    try {
        triggerNativeFileSelect();
    } catch (error) {
        var hint = document.getElementById('mobileUploadAssistHint');
        if (hint) {
            hint.textContent = mobileUploadState.isCompanionApp
                ? '当前系统没有直接拉起选择器，请手动点“从相册导入”或“直接拍照/录像”。'
                : '当前手机浏览器拦截了自动拉起，请改点“从相册导入”或“直接拍照/录像”。';
        }
        console.warn('自动拉起选择器失败:', error);
    }
    return true;
}

function handleFileSelect(event) {
    var files = event.target.files;
    if (files.length > 0) {
        addFilesToSelection(files);
    }
    event.target.value = '';
    
    // 如果是不支持多选的设备，显示快速选择提示
    if (autoContinueMode && selectedFiles.length > 0) {
        showQuickAddBar();
    }
}

function showQuickAddBar() {
    var previewArea = document.getElementById('previewArea');
    var quickBar = document.getElementById('quickAddBar');
    
    if (!quickBar) {
        quickBar = document.createElement('div');
        quickBar.id = 'quickAddBar';
        quickBar.className = 'position-fixed bottom-0 start-0 end-0 p-3 bg-white border-top shadow-lg';
        quickBar.style.cssText = 'z-index: 1060;';
        quickBar.innerHTML = '<div class="d-flex justify-content-center align-items-center gap-3"><button class="btn btn-outline-secondary" onclick="clearSelectedFiles(); hideQuickAddBar();"><i class="fas fa-trash me-1"></i>清空</button><button class="btn btn-primary btn-lg px-4" onclick="triggerFileSelect()"><i class="fas fa-plus me-1"></i>继续添加</button><button class="btn btn-success btn-lg px-4" onclick="startUpload()"><i class="fas fa-upload me-1"></i>上传 (' + selectedFiles.length + '项)</button></div>';
        document.body.appendChild(quickBar);
    } else {
        // 更新数量
        var uploadBtn = quickBar.querySelector('.btn-success');
        if (uploadBtn) {
            uploadBtn.innerHTML = '<i class="fas fa-upload me-1"></i>上传 (' + selectedFiles.length + '项)';
        }
        quickBar.style.display = 'block';
    }
}

function hideQuickAddBar() {
    var quickBar = document.getElementById('quickAddBar');
    if (quickBar) {
        quickBar.style.display = 'none';
    }
}

function triggerFileSelect() {
    triggerNativeFileSelect();
}

function startUpload() {
    hideQuickAddBar();
    uploadFiles();
}

function addFilesToSelection(files) {
    var newFiles = Array.from(files);
    
    newFiles.forEach(function(file) {
        var isDuplicate = selectedFiles.some(function(f) { 
            return f.name === file.name && f.size === file.size;
        });
        if (!isDuplicate) {
            selectedFiles.push(file);
        }
    });
    
    updatePreview();
}

function updatePreview() {
    var previewArea = document.getElementById('previewArea');
    var previewGrid = document.getElementById('previewGrid');
    var uploadBtn = document.getElementById('uploadBtn');
    var fileCount = document.getElementById('fileCount');
    
    previewGrid.innerHTML = '';
    
    if (selectedFiles.length === 0) {
        previewArea.style.display = 'none';
        uploadBtn.disabled = true;
        hideQuickAddBar();
        return;
    }
    
    selectedFiles.forEach(function(file, index) {
        var col = document.createElement('div');
        col.className = 'col-md-3 col-6 mb-2';
        
        var previewItem = document.createElement('div');
        previewItem.className = 'preview-item';
        
        if (file.type.indexOf('video/') === 0) {
            previewItem.classList.add('is-video');
            var video = document.createElement('video');
            video.src = URL.createObjectURL(file);
            video.muted = true;
            previewItem.appendChild(video);
        } else {
            var img = document.createElement('img');
            img.src = URL.createObjectURL(file);
            previewItem.appendChild(img);
        }
        
        var removeBtn = document.createElement('button');
        removeBtn.className = 'remove-btn';
        removeBtn.innerHTML = '<i class="fas fa-times"></i>';
        removeBtn.onclick = function(e) {
            e.preventDefault();
            selectedFiles.splice(index, 1);
            updatePreview();
        };
        previewItem.appendChild(removeBtn);
        
        col.appendChild(previewItem);
        previewGrid.appendChild(col);
    });
    
    if (fileCount) fileCount.textContent = selectedFiles.length;
    previewArea.style.display = 'block';
    uploadBtn.disabled = false;
}

function addMoreFiles() {
    triggerNativeFileSelect();
}

function clearSelectedFiles() {
    selectedFiles = [];
    document.getElementById('fileInput').value = '';
    document.getElementById('previewArea').style.display = 'none';
    document.getElementById('uploadBtn').disabled = true;
    hideQuickAddBar();
}

// 拖拽上传
var dropZone = document.getElementById('dropZone');

dropZone.addEventListener('dragover', function(e) {
    e.preventDefault();
    this.classList.add('dragover');
});

dropZone.addEventListener('dragleave', function(e) {
    e.preventDefault();
    this.classList.remove('dragover');
});

dropZone.addEventListener('drop', function(e) {
    e.preventDefault();
    this.classList.remove('dragover');
    
    var files = e.dataTransfer.files;
    if (files.length > 0) {
        addFilesToSelection(files);
    }
});

function previewFiles(files) {
    addFilesToSelection(files);
}

var DEFAULT_UPLOAD_CHUNK_SIZE = 8 * 1024 * 1024;
var MAX_UPLOAD_RETRIES = 3;

function buildUploadMessageFromResponse(status, responseText) {
    if (status === 413) {
        return '上传分片仍被公网链路拒绝，请稍后重试。';
    }
    if (status === 502 || status === 504) {
        return '公网上传通道超时，请稍后重试。';
    }
    if (!responseText) {
        return '服务端返回为空，上传未完成。';
    }
    return '服务端返回了非 JSON 响应，上传未完成。';
}

function parseUploadJson(status, responseText) {
    try {
        return JSON.parse(responseText);
    } catch (e) {
        return {
            success: false,
            message: buildUploadMessageFromResponse(status, responseText)
        };
    }
}

function updateBatchUploadProgress(progressBar, statusText, sizeInfo, speedInfo, startTime, sentBytes, totalBytes, currentLabel) {
    var safeTotalBytes = totalBytes > 0 ? totalBytes : 1;
    var percent = Math.round((sentBytes / safeTotalBytes) * 100);
    progressBar.style.width = percent + '%';
    sizeInfo.textContent = formatSize(sentBytes) + ' / ' + formatSize(totalBytes);

    var now = Date.now();
    var elapsed = Math.max((now - startTime) / 1000, 0.001);
    var speed = sentBytes / elapsed;
    speedInfo.textContent = speed > 0 ? (formatSize(speed) + '/s') : '计算中...';

    if (sentBytes >= totalBytes) {
        statusText.textContent = currentLabel ? (currentLabel + ' · 正在收尾...') : '正在收尾...';
        return;
    }

    var remaining = speed > 0 ? (totalBytes - sentBytes) / speed : 0;
    if (remaining > 60) {
        statusText.textContent = currentLabel + ' · ' + percent + '% · 预计剩余 ' + Math.round(remaining / 60) + ' 分钟';
    } else if (remaining > 1) {
        statusText.textContent = currentLabel + ' · ' + percent + '% · 预计剩余 ' + Math.round(remaining) + ' 秒';
    } else {
        statusText.textContent = currentLabel + ' · ' + percent + '%';
    }
}

function resetUploadUi() {
    document.getElementById('fileInput').value = '';
    document.getElementById('previewArea').style.display = 'none';
    document.getElementById('uploadProgress').style.display = 'none';
    document.getElementById('uploadBtn').disabled = true;
    hideQuickAddBar();
}

function completeSuccessfulUpload() {
    var modalEl = document.getElementById('uploadModal');
    var modal = bootstrap.Modal.getInstance(modalEl);
    if (modal) {
        modal.hide();
    }
    selectedFiles = [];
    resetUploadUi();

    setTimeout(function() {
        if (typeof loadDateData === 'function' && typeof window.currentCalendarDate !== 'undefined') {
            loadDateData(formatDate(window.currentCalendarDate));
        } else {
            window.location.reload();
        }
    }, 500);
}

function postJson(url, payload) {
    return fetch(url, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
        },
        body: JSON.stringify(payload)
    }).then(function(response) {
        return response.text().then(function(text) {
            return {
                status: response.status,
                data: parseUploadJson(response.status, text)
            };
        });
    });
}

function uploadChunkRequest(uploadId, file, chunkBlob, chunkIndex, totalChunks, committedBytesBeforeChunk, totalBytes, uiState) {
    return new Promise(function(resolve, reject) {
        var xhr = new XMLHttpRequest();
        xhr.open('POST', '/api/upload/sessions/' + encodeURIComponent(uploadId) + '/chunk', true);
        xhr.setRequestHeader('Accept', 'application/json');

        xhr.upload.onprogress = function(e) {
            if (!e.lengthComputable) return;
            updateBatchUploadProgress(
                uiState.progressBar,
                uiState.statusText,
                uiState.sizeInfo,
                uiState.speedInfo,
                uiState.startTime,
                committedBytesBeforeChunk + e.loaded,
                totalBytes,
                uiState.currentLabel
            );
        };

        xhr.onload = function() {
            var data = parseUploadJson(xhr.status, xhr.responseText || '');
            if (xhr.status >= 200 && xhr.status < 300 && data && data.success) {
                resolve(data);
                return;
            }
            var error = new Error((data && data.message) || ('HTTP错误 ' + xhr.status));
            error.status = xhr.status;
            error.data = data;
            reject(error);
        };

        xhr.onerror = function() {
            reject(new Error('上传分片时网络异常'));
        };

        xhr.onabort = function() {
            reject(new Error('上传已取消'));
        };

        var formData = new FormData();
        formData.append('chunk_index', String(chunkIndex));
        formData.append('total_chunks', String(totalChunks));
        formData.append('chunk', chunkBlob, file.name + '.part' + chunkIndex);
        xhr.send(formData);
    });
}

async function retryUploadStep(label, action) {
    var lastError = null;
    for (var attempt = 1; attempt <= MAX_UPLOAD_RETRIES; attempt += 1) {
        try {
            return await action();
        } catch (error) {
            lastError = error;
            if (error && error.status === 401 && error.data && error.data.require_family_code && error.data.redirect_url) {
                window.location.href = error.data.redirect_url;
                throw error;
            }
            if (error && error.status === 409 && error.data && typeof error.data.next_chunk_index === 'number') {
                return error.data;
            }
            if (attempt >= MAX_UPLOAD_RETRIES) {
                break;
            }
            await new Promise(function(resolve) { setTimeout(resolve, attempt * 400); });
        }
    }
    throw lastError || new Error(label + '失败');
}

async function uploadSingleFileInChunks(file, fileIndex, totalFiles, totalBytes, sentBytes, uiState) {
    var sessionResponse = await retryUploadStep('创建上传会话', function() {
        return postJson('/api/upload/sessions', {
            filename: file.name,
            total_size: file.size,
            mime_type: file.type || 'application/octet-stream',
            caption: ''
        }).then(function(result) {
            if (result.status >= 200 && result.status < 300 && result.data) {
                return result.data;
            }
            var error = new Error((result.data && result.data.message) || ('HTTP错误 ' + result.status));
            error.status = result.status;
            error.data = result.data;
            throw error;
        });
    });

    if (sessionResponse.require_family_code && sessionResponse.redirect_url) {
        window.location.href = sessionResponse.redirect_url;
        throw new Error(sessionResponse.message || '请先输入家庭码');
    }

    if (sessionResponse.already_exists) {
        sentBytes += file.size;
        updateBatchUploadProgress(
            uiState.progressBar,
            uiState.statusText,
            uiState.sizeInfo,
            uiState.speedInfo,
            uiState.startTime,
            sentBytes,
            totalBytes,
            '第 ' + fileIndex + '/' + totalFiles + ' 个：' + file.name + '（已跳过）'
        );
        return {
            sentBytes: sentBytes,
            uploadedCount: 0,
            skippedCount: sessionResponse.skipped_count || 1
        };
    }

    var uploadId = sessionResponse.upload_id;
    var chunkSize = Math.max(sessionResponse.chunk_size || DEFAULT_UPLOAD_CHUNK_SIZE, 256 * 1024);
    var totalChunks = Math.max(Math.ceil(file.size / chunkSize), 1);

    for (var chunkIndex = 0; chunkIndex < totalChunks; chunkIndex += 1) {
        var start = chunkIndex * chunkSize;
        var end = Math.min(start + chunkSize, file.size);
        var chunkBlob = file.slice(start, end);
        uiState.currentLabel = '第 ' + fileIndex + '/' + totalFiles + ' 个：' + file.name;

        var chunkResponse = await retryUploadStep('上传分片', function() {
            return uploadChunkRequest(uploadId, file, chunkBlob, chunkIndex, totalChunks, sentBytes, totalBytes, uiState);
        });

        if (chunkResponse && typeof chunkResponse.next_chunk_index === 'number' && chunkResponse.next_chunk_index > chunkIndex + 1) {
            sentBytes += chunkBlob.size;
        } else {
            sentBytes += chunkBlob.size;
        }

        updateBatchUploadProgress(
            uiState.progressBar,
            uiState.statusText,
            uiState.sizeInfo,
            uiState.speedInfo,
            uiState.startTime,
            sentBytes,
            totalBytes,
            uiState.currentLabel
        );
    }

    var completeResponse = await retryUploadStep('完成上传', function() {
        return postJson('/api/upload/sessions/' + encodeURIComponent(uploadId) + '/complete', {
            total_chunks: totalChunks
        }).then(function(result) {
            if (result.status >= 200 && result.status < 300 && result.data) {
                return result.data;
            }
            var error = new Error((result.data && result.data.message) || ('HTTP错误 ' + result.status));
            error.status = result.status;
            error.data = result.data;
            throw error;
        });
    });

    return {
        sentBytes: sentBytes,
        uploadedCount: completeResponse.count || 0,
        skippedCount: completeResponse.skipped_count || 0
    };
}

async function uploadFiles() {
    if (selectedFiles.length === 0) return;

    var progressArea = document.getElementById('uploadProgress');
    var progressBar = progressArea.querySelector('.progress-bar');
    var statusText = document.getElementById('uploadStatus');
    var sizeInfo = document.getElementById('uploadSizeInfo');
    var speedInfo = document.getElementById('uploadSpeedInfo');
    var uploadBtn = document.getElementById('uploadBtn');

    progressArea.style.display = 'block';
    uploadBtn.disabled = true;

    var totalSize = selectedFiles.reduce(function(sum, file) { return sum + file.size; }, 0);
    var startTime = Date.now();
    var sentBytes = 0;
    var uploadedCount = 0;
    var skippedCount = 0;
    var failedItems = [];

    progressBar.style.width = '0%';
    sizeInfo.textContent = '0 KB / ' + formatSize(totalSize);
    speedInfo.textContent = '计算中...';
    statusText.textContent = '正在准备上传 ' + selectedFiles.length + ' 个文件...';

    var uiState = {
        progressBar: progressBar,
        statusText: statusText,
        sizeInfo: sizeInfo,
        speedInfo: speedInfo,
        startTime: startTime,
        currentLabel: ''
    };

    var filesToUpload = selectedFiles.slice();
    for (var index = 0; index < filesToUpload.length; index += 1) {
        var file = filesToUpload[index];
        try {
            var result = await uploadSingleFileInChunks(
                file,
                index + 1,
                filesToUpload.length,
                totalSize,
                sentBytes,
                uiState
            );
            sentBytes = result.sentBytes;
            uploadedCount += result.uploadedCount;
            skippedCount += result.skippedCount;
        } catch (error) {
            console.error('批量上传中的文件失败:', file.name, error);
            failedItems.push({
                file: file,
                message: error && error.message ? error.message : '上传失败'
            });
            sentBytes += file.size;
            updateBatchUploadProgress(
                progressBar,
                statusText,
                sizeInfo,
                speedInfo,
                startTime,
                Math.min(sentBytes, totalSize),
                totalSize,
                '第 ' + (index + 1) + '/' + filesToUpload.length + ' 个：' + file.name + '（失败）'
            );
        }
    }

    progressBar.style.width = '100%';
    sizeInfo.textContent = formatSize(totalSize) + ' / ' + formatSize(totalSize);
    speedInfo.textContent = '完成';

    if (failedItems.length === 0) {
        statusText.textContent = '上传完成！';
        showNotification('上传完成：成功 ' + uploadedCount + ' 个，跳过 ' + skippedCount + ' 个', 'success');
        completeSuccessfulUpload();
        return;
    }

    selectedFiles = failedItems.map(function(item) { return item.file; });
    updatePreview();
    uploadBtn.disabled = false;

    statusText.textContent = '批量上传完成，但有 ' + failedItems.length + ' 个文件失败';
    var failedNames = failedItems.slice(0, 3).map(function(item) { return item.file.name; }).join('，');
    var suffix = failedItems.length > 3 ? ' 等 ' + failedItems.length + ' 个文件' : '';
    showNotification(
        '批量上传部分失败：成功 ' + uploadedCount + ' 个，跳过 ' + skippedCount + ' 个，失败 ' + failedItems.length + ' 个。' + failedNames + suffix,
        'warning',
        6000
    );
}

// 格式化文件大小
function formatSize(bytes) {
    if (bytes === 0) return '0 B';
    if (!bytes || bytes < 0) return '--';
    var k = 1024;
    var sizes = ['B', 'KB', 'MB', 'GB'];
    var i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
}

detectMobileUploadContext();

document.getElementById('uploadModal').addEventListener('shown.bs.modal', function () {
    detectMobileUploadContext();
    refreshUploadCapabilities();
    if (mobileUploadState.isMobile && mobileUploadState.isLocalNetwork && selectedFiles.length === 0) {
        setTimeout(function() {
            tryAutoOpenMobilePicker(false);
        }, 120);
    }
});
</script>
