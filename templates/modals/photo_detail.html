<!-- 照片详情模态框 -->
<div class="modal fade" id="photoDetailModal" tabindex="-1" aria-labelledby="photoDetailModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="photoDetailModalLabel">照片详情</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="text-center mb-3 position-relative">
                    <!-- 左切换按钮 -->
                    <button type="button" class="btn btn-light position-absolute start-0 top-50 translate-middle-y" 
                            onclick="navigatePhoto(-1)" id="prevPhotoBtn" style="z-index:10; opacity:0.8;">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    
                    <img id="detailPhoto" src="" alt="照片" class="img-fluid rounded" style="max-height: 60vh;">
                    
                    <!-- 右切换按钮 -->
                    <button type="button" class="btn btn-light position-absolute end-0 top-50 translate-middle-y" 
                            onclick="navigatePhoto(1)" id="nextPhotoBtn" style="z-index:10; opacity:0.8;">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>

                <div class="mb-2">
                    <small class="text-muted" id="photoCounter"></small>
                </div>

                <div class="mb-3">
                    <label class="form-label">描述</label>
                    <div id="detailCaption" class="form-control-plaintext">无标注</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">日期</label>
                    <div id="detailDate" class="form-control-plaintext"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
            </div>
        </div>
    </div>
</div>

<script>
// 照片浏览相关变量
var currentPhotoIndex = 0;
var currentPhotoList = [];

function viewPhotoDetail(filename) {
    console.log('[详情] 打开照片详情, filename:', filename);
    
    // 获取当前日期的所有照片列表
    currentPhotoList = window.currentPhotos || [];
    console.log('[详情] 当前照片列表数量:', currentPhotoList.length);
    
    // 如果列表为空，尝试从DOM获取
    if (currentPhotoList.length === 0) {
        console.log('[详情] 尝试从DOM获取照片');
        var photoElements = document.querySelectorAll('.gallery-item-uni');
        currentPhotoList = Array.from(photoElements).map(function(el) {
            var img = el.querySelector('img');
            var fname = el.dataset.photoId;
            return { filename: fname, url: img ? img.src : '' };
        });
        console.log('[详情] 从DOM获取照片数量:', currentPhotoList.length);
    }
    
    // 如果还是为空，从API重新加载
    if (currentPhotoList.length === 0) {
        var dateStr = window.currentCalendarDate ? formatDate(window.currentCalendarDate) : formatDate(new Date());
        console.log('[详情] 重新加载日期:', dateStr);
        fetch('/api/photos?date=' + dateStr)
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.photos) {
                    currentPhotoList = data.photos;
                    console.log('[详情] 从API获取照片数量:', currentPhotoList.length);
                    continueViewPhotoDetail(filename);
                }
            });
        return;
    }
    
    continueViewPhotoDetail(filename);
}

function continueViewPhotoDetail(filename) {
    // 找到当前照片的索引
    currentPhotoIndex = currentPhotoList.findIndex(function(p) { return p.filename === filename; });
    if (currentPhotoIndex === -1) currentPhotoIndex = 0;
    
    // 显示照片
    showCurrentPhoto();
    
    // 显示模态框
    new bootstrap.Modal(document.getElementById('photoDetailModal')).show();
}

function showCurrentPhoto() {
    if (currentPhotoList.length === 0) {
        console.log('[详情] 照片列表为空');
        return;
    }
    
    var photo = currentPhotoList[currentPhotoIndex];
    if (!photo || !photo.filename) {
        console.log('[详情] 照片数据无效');
        return;
    }
    
    // 设置图片
    var img = document.getElementById('detailPhoto');
    var safeFilename = photo.filename.split('/').pop();
    var imageUrl = photo.url || '/photo/' + encodeURIComponent(safeFilename);
    img.src = imageUrl;
    
    // 图片加载失败时尝试缩略图
    img.onerror = function() {
        console.log('[详情] 图片加载失败，尝试缩略图');
        if (img.src.indexOf('/photo/thumb/') === -1) {
            img.src = '/photo/thumb/' + encodeURIComponent(safeFilename);
        }
    };
    
    // 设置描述和日期
    document.getElementById('detailCaption').textContent = photo.caption || photo.tag || '无标注';
    document.getElementById('detailDate').textContent = photo.date || '';
    
    // 更新计数器
    document.getElementById('photoCounter').textContent = 
        (currentPhotoIndex + 1) + ' / ' + currentPhotoList.length;
    
    // 更新按钮状态
    document.getElementById('prevPhotoBtn').disabled = currentPhotoIndex === 0;
    document.getElementById('nextPhotoBtn').disabled = currentPhotoIndex === currentPhotoList.length - 1;
    
    // 隐藏/显示按钮
    document.getElementById('prevPhotoBtn').style.visibility = currentPhotoIndex === 0 ? 'hidden' : 'visible';
    document.getElementById('nextPhotoBtn').style.visibility = currentPhotoIndex === currentPhotoList.length - 1 ? 'hidden' : 'visible';
}

function navigatePhoto(direction) {
    var newIndex = currentPhotoIndex + direction;
    if (newIndex >= 0 && newIndex < currentPhotoList.length) {
        currentPhotoIndex = newIndex;
        showCurrentPhoto();
    }
}

// 键盘左右键切换
document.addEventListener('keydown', function(e) {
    const modal = document.getElementById('photoDetailModal');
    if (modal.classList.contains('show')) {
        if (e.key === 'ArrowLeft') {
            navigatePhoto(-1);
        } else if (e.key === 'ArrowRight') {
            navigatePhoto(1);
        }
    }
});
</script>
