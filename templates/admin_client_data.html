<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户端数据 - 管理后台</title>
    <link rel="stylesheet" href="/static/vendor/bootstrap/bootstrap-5.3.0.min.css">
    <link rel="stylesheet" href="/static/vendor/fontawesome/fontawesome-6.4.0.all.min.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/admin/dashboard">
                <i class="fas fa-cog me-2"></i>管理后台
            </a>
            <div class="d-flex">
                <a href="/admin/dashboard" class="btn btn-outline-light btn-sm me-2">返回 Dashboard</a>
                <a href="/admin/logout" class="btn btn-outline-danger btn-sm">退出</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">
            <!-- 侧边栏 -->
            <div class="col-md-2">
                <div class="list-group">
                    <a href="/admin/dashboard" class="list-group-item list-group-item-action">
                        <i class="fas fa-tachometer-alt me-2"></i>概览
                    </a>
                    <a href="/admin/clients" class="list-group-item list-group-item-action">
                        <i class="fas fa-users me-2"></i>客户端管理
                    </a>
                    <a href="/admin/credentials" class="list-group-item list-group-item-action">
                        <i class="fas fa-key me-2"></i>凭证管理
                    </a>
                    <a href="/admin/tunnel-pool" class="list-group-item list-group-item-action">
                        <i class="fas fa-network-wired me-2"></i>Tunnel池
                    </a>
                    <a href="/admin/news-pool" class="list-group-item list-group-item-action">
                        <i class="fas fa-newspaper me-2"></i>新闻池
                    </a>
                    <a href="/admin/client-data" class="list-group-item list-group-item-action active">
                        <i class="fas fa-baby me-2"></i>客户端数据
                    </a>
                    <a href="/admin/settings" class="list-group-item list-group-item-action">
                        <i class="fas fa-cog me-2"></i>系统设置
                    </a>
                </div>
            </div>

            <!-- 主内容区 -->
            <div class="col-md-10">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2><i class="fas fa-baby me-2"></i>客户端数据</h2>
                    <div class="text-muted">
                        共 <span id="totalClients">0</span> 个客户端
                    </div>
                </div>

                <!-- 统计卡片 -->
                <div class="row mb-4">
                    <div class="col-md-3">
                        <div class="card bg-primary text-white">
                            <div class="card-body">
                                <div class="d-flex justify-content-between">
                                    <div>
                                        <h4 id="totalLogs">0</h4>
                                        <div>总日志数</div>
                                    </div>
                                    <i class="fas fa-book fa-2x opacity-50"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card bg-success text-white">
                            <div class="card-body">
                                <div class="d-flex justify-content-between">
                                    <div>
                                        <h4 id="totalPhotos">0</h4>
                                        <div>总照片数</div>
                                    </div>
                                    <i class="fas fa-images fa-2x opacity-50"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card bg-info text-white">
                            <div class="card-body">
                                <div class="d-flex justify-content-between">
                                    <div>
                                        <h4 id="totalTags">0</h4>
                                        <div>标签照片</div>
                                    </div>
                                    <i class="fas fa-tags fa-2x opacity-50"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card bg-warning text-white">
                            <div class="card-body">
                                <div class="d-flex justify-content-between">
                                    <div>
                                        <h4 id="todayLogs">0</h4>
                                        <div>今日日志</div>
                                    </div>
                                    <i class="fas fa-calendar-day fa-2x opacity-50"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 客户端列表 -->
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0"><i class="fas fa-list me-2"></i>客户端列表</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>客户端ID</th>
                                        <th>宝宝名字</th>
                                        <th>日志数</th>
                                        <th>照片数</th>
                                        <th>最新日志</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="clientsTableBody">
                                    <!-- 动态加载 -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 查看客户端详情模态框 -->
    <div class="modal fade" id="clientDetailModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fas fa-baby me-2"></i>
                        <span id="detailClientName">客户端详情</span>
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <!-- 日志列表 -->
                    <h6 class="mb-3"><i class="fas fa-book me-2"></i>成长日志</h6>
                    <div id="clientLogsList" class="mb-4">
                        <!-- 动态加载 -->
                    </div>
                    
                    <!-- 照片列表 -->
                    <h6 class="mb-3"><i class="fas fa-images me-2"></i>照片</h6>
                    <div id="clientPhotosGrid" class="row g-2">
                        <!-- 动态加载 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/vendor/bootstrap/bootstrap-5.3.0.bundle.min.js"></script>
    <script>
        // 加载客户端数据摘要
        async function loadClientDataSummary() {
            try {
                const response = await fetch('/admin/api/client-data/summary');
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('totalClients').textContent = data.summary.length;
                    document.getElementById('totalLogs').textContent = data.total_logs;
                    document.getElementById('totalPhotos').textContent = data.total_photos;
                    document.getElementById('totalTags').textContent = data.total_tags;
                    document.getElementById('todayLogs').textContent = data.today_logs;
                    
                    renderClientsTable(data.summary);
                }
            } catch (error) {
                console.error('加载数据失败:', error);
            }
        }

        // 渲染客户端列表
        function renderClientsTable(clients) {
            const tbody = document.getElementById('clientsTableBody');
            
            if (clients.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">暂无数据</td></tr>';
                return;
            }
            
            tbody.innerHTML = clients.map(client => `
                <tr>
                    <td><code>${client.client_id}</code></td>
                    <td>${client.baby_name || '未知'}</td>
                    <td><span class="badge bg-primary">${client.log_count}</span></td>
                    <td><span class="badge bg-success">${client.photo_count}</span></td>
                    <td>${client.latest_log || '-'}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary" onclick="viewClientDetail('${client.client_id}')">
                            <i class="fas fa-eye me-1"></i>查看
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // 查看客户端详情
        async function viewClientDetail(clientId) {
            try {
                const response = await fetch(`/admin/api/client-data/${clientId}`);
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('detailClientName').textContent = 
                        `${data.baby_name || '未知宝宝'} (${clientId})`;
                    
                    // 渲染日志
                    const logsContainer = document.getElementById('clientLogsList');
                    if (data.logs && data.logs.length > 0) {
                        logsContainer.innerHTML = data.logs.map(log => `
                            <div class="card mb-2">
                                <div class="card-body">
                                    <div class="d-flex justify-content-between">
                                        <strong>${log.date}</strong>
                                        <small class="text-muted">${log.metadata?.city || ''} ${log.metadata?.weather || ''}</small>
                                    </div>
                                    <p class="mb-0 mt-2">${log.content.substring(0, 100)}...</p>
                                </div>
                            </div>
                        `).join('');
                    } else {
                        logsContainer.innerHTML = '<p class="text-muted">暂无日志</p>';
                    }
                    
                    // 渲染照片
                    const photosContainer = document.getElementById('clientPhotosGrid');
                    if (data.photos && data.photos.length > 0) {
                        photosContainer.innerHTML = data.photos.map(photo => `
                            <div class="col-3">
                                <div class="card">
                                    <img src="/admin/api/client-data/photo/${clientId}/${photo.filename}" 
                                         class="card-img-top" style="height: 100px; object-fit: cover;">
                                    ${photo.tag ? `<div class="card-body py-1"><small class="text-muted">${photo.tag}</small></div>` : ''}
                                </div>
                            </div>
                        `).join('');
                    } else {
                        photosContainer.innerHTML = '<p class="text-muted">暂无照片</p>';
                    }
                    
                    const modal = new bootstrap.Modal(document.getElementById('clientDetailModal'));
                    modal.show();
                }
            } catch (error) {
                console.error('加载详情失败:', error);
            }
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', loadClientDataSummary);
    </script>
</body>
</html>
