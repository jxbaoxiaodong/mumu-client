<style>

    .album-preview-card {

{% block content %}
<div class="cards-page-container">
    <a href="/" class="back-link"><i class="fas fa-arrow-left"></i>返回首页</a>
    
    <div class="cards-header">
        <h1>✨ 成长卡片</h1>
        <div class="cards-subtitle">{{ baby_name }}的精彩瞬间</div>
        <div class="cards-count"><span id="cardCount">0</span> 张卡片 · <a href="/help?topic=cards#page-cards" class="text-decoration-none">查看帮助</a></div>
    </div>

    <div class="cards-filter-shell">
        <div class="cards-filter-tabs" id="cardsCategoryTabs"></div>
        <div class="cards-category-desc" id="cardsCategoryDesc"></div>
    </div>
    
    <div class="card-display-area">
        <div class="card-wrapper">
            <div id="currentCard">
                <div class="loading-indicator">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p style="margin-top:15px">正在加载卡片...</p>
                </div>
            </div>
        </div>
    </div>
    
    <div class="card-nav">
        <button class="nav-btn" onclick="changeCard(-1)" id="prevBtn" disabled>
            <i class="fas fa-chevron-left"></i>
        </button>
        <button class="nav-btn" onclick="changeCard(1)" id="nextBtn" disabled>
            <i class="fas fa-chevron-right"></i>
        </button>
    </div>
    
    <div class="card-pagination" id="cardPagination"></div>
</div>

<!-- 图片预览模态框 -->
<div class="image-preview-modal" id="imagePreviewModal">
    <div class="image-preview-content">
        <div class="image-preview-header">
            <span>保存图片</span>
            <button class="image-preview-close" onclick="closeImagePreview()">✕</button>
        </div>
        <img id="previewImage" src="" alt="卡片图片">
        <div class="image-preview-tip" id="previewTip">长按图片保存到手机</div>
        <button class="image-preview-download" id="downloadBtn" onclick="downloadImage()" style="display:none;">下载图片</button>
    </div>
</div>

<!-- html2canvas库 -->
<script src="/static/vendor/html2canvas/html2canvas.min.js"></script>

<script>
window.__CARDS__ = {{ cards|tojson }};
window.__INITIAL_CATEGORY__ = {{ initial_category|tojson }};
window.__CATEGORY_COUNTS__ = {{ category_counts|tojson }};
</script>

<script>
let allCards = Array.isArray(window.__CARDS__) ? window.__CARDS__ : [];
let currentCardIndex = 0;
let pregeneratedCanvas = null;
let currentCategory = window.__INITIAL_CATEGORY__ || 'all';
let cardCategoryCounts = Array.isArray(window.__CATEGORY_COUNTS__) ? window.__CATEGORY_COUNTS__ : [];

function getPhotoUrl(path) {
    if (!path) return '';
    if (path.indexOf('/photo/') === 0 || path.indexOf('/photo/thumb/') === 0) {
        return path;
    }
    return '/photo/' + path.split('/').pop();
}

function getPhotoThumbUrl(path) {
    if (!path) return '';
    if (path.indexOf('/generated-assets/') === 0 || path.indexOf('/story-assets/') === 0 || path.indexOf('/video/thumb/') === 0) return path;
    if (path.indexOf('/photo/thumb/') === 0) return path;
    if (path.indexOf('/photo/') === 0) {
        return '/photo/thumb/' + path.replace('/photo/', '');
    }
    return '/photo/thumb/' + path.split('/').pop();
}

function getCardImageUrl(path) {
    return getPhotoThumbUrl(path);
}

function formatCardDate(dateStr) {
    if (!dateStr) return '';
    var text = String(dateStr).trim();
    if (text.indexOf('-') >= 0 && text.length >= 10) {
        var parts = text.slice(0, 10).split('-');
        if (parts.length === 3) {
            return parts[0].slice(-2) + '.' + parts[1] + '.' + parts[2];
        }
    }
    if (text.indexOf('.') >= 0 && text.length >= 8) {
        return text.slice(0, 8);
    }
    return text;
}

function escapeHtml(text) {
    return String(text == null ? '' : text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function updateCategoryUrl(category) {
    const url = new URL(window.location.href);
    if (!category || category === 'all') {
        url.searchParams.delete('category');
    } else {
        url.searchParams.set('category', category);
    }
    window.history.replaceState({}, '', url.toString());
}

function getCategoryMeta(category) {
    const source = cardCategoryCounts.find(function(item) {
        return item && item.key === category;
    });
    if (source) {
        return source;
    }
    return {
        key: category,
        label: category,
        description: '',
        count: 0
    };
}

function renderCategoryTabs() {
    const container = document.getElementById('cardsCategoryTabs');
    const descEl = document.getElementById('cardsCategoryDesc');
    if (!container) return;

    container.innerHTML = cardCategoryCounts.map(function(item) {
        const isActive = item.key === currentCategory;
        return '<button class="cards-filter-btn ' + (isActive ? 'active' : '') + '" onclick="switchCardCategory(\'' + escapeHtml(item.key) + '\')">'
            + escapeHtml(item.label)
            + '<span class="cards-filter-count">' + escapeHtml(String(item.count || 0)) + '</span>'
            + '</button>';
    }).join('');

    const current = getCategoryMeta(currentCategory);
    if (descEl) {
        descEl.textContent = current.description || '';
    }
}

function switchCardCategory(category) {
    if (!category || category === currentCategory) return;
    currentCategory = category;
    currentCardIndex = 0;
    renderCategoryTabs();
    loadCards(category, true);
}

function getCardPhotos(card) {
    if (!card) return [];
    if (card.assets && Array.isArray(card.assets.photos) && card.assets.photos.length) {
        return card.assets.photos;
    }
    if (Array.isArray(card.photos) && card.photos.length) {
        return card.photos;
    }
    if (Array.isArray(card.photo_paths) && card.photo_paths.length) {
        return card.photo_paths.map(function(path) {
            return { path: path };
        });
    }
    return [];
}

function renderPhotoThumb(path, dateText, extraClass) {
    var thumbUrl = getPhotoThumbUrl(path);
    var html = '<div class="photo-grid-item ' + (extraClass || '') + '">';
    html += '<img src="' + thumbUrl + '" crossorigin="anonymous">';
    if (dateText) {
        html += '<div class="photo-grid-caption">' + escapeHtml(formatCardDate(dateText)) + '</div>';
    }
    html += '</div>';
    return html;
}

function renderGridPhotos(card, limit) {
    var photos = getCardPhotos(card).slice(0, limit || 6);
    if (!photos.length) {
        return '';
    }
    return '<div class="photo-grid-layout">' + photos.map(function(photo) {
        var path = typeof photo === 'string' ? photo : (photo.path || photo.photo || '');
        var dateText = typeof photo === 'object' ? (photo.date || photo.created_at || '') : '';
        return renderPhotoThumb(path, dateText);
    }).join('') + '</div>';
}

function renderTagCollageCard(card) {
    var photos = getCardPhotos(card);
    var coverPhoto = card.photo || (photos[0] && (photos[0].path || photos[0].photo)) || '';
    var html = '<div class="growth-card">';
    html += '<div class="card-content">';
    html += '<div class="card-title">' + escapeHtml(card.title || '标签聚合') + '</div>';
    html += '<div class="card-text">' + escapeHtml(card.subtitle || card.content || '') + '</div>';
    if (photos.length >= 2) {
        html += '<div class="tag-collage-layout">' + photos.slice(0, 4).map(function(photo) {
            var path = typeof photo === 'string' ? photo : (photo.path || photo.photo || '');
            var dateText = typeof photo === 'object' ? (photo.date || photo.created_at || '') : '';
            var badge = dateText ? '<div class="tag-photo-date">' + escapeHtml(formatCardDate(dateText)) + '</div>' : '';
            return '<div class="tag-photo-item"><img src="' + getCardImageUrl(path) + '" crossorigin="anonymous">' + badge + '</div>';
        }).join('') + '</div>';
    } else if (coverPhoto) {
        html += '<div class="card-photo-wrapper" style="margin-top:14px;"><img src="' + getCardImageUrl(coverPhoto) + '" style="width:100%;border-radius:12px;" crossorigin="anonymous"></div>';
    }
    html += '</div>';
    html += buildCardFooter();
    html += '</div>';
    return html;
}

function renderComparisonCard(card) {
    var assets = card.assets || {};
    var beforePhoto = assets.before_photo || card.before_photo || (card.photo_paths && card.photo_paths[0]) || '';
    var afterPhoto = assets.after_photo || card.after_photo || (card.photo_paths && card.photo_paths[1]) || '';
    var beforeDate = assets.before_label || card.before_date || '';
    var afterDate = assets.after_label || card.after_date || '';
    var html = '<div class="growth-card comparison-card">';
    html += '<div class="card-content">';
    html += '<div class="card-title">' + escapeHtml(card.title || '成长对比') + '</div>';
    html += '<div class="card-text">' + escapeHtml(card.subtitle || card.content || '') + '</div>';
    html += '<div class="comparison-panel">';
    html += '<div class="comparison-side">';
    if (beforePhoto) {
        html += beforeDate ? '<div class="card-date-badge centered">' + escapeHtml(beforeDate) + '</div>' : '';
        html += '<img src="' + getCardImageUrl(beforePhoto) + '" crossorigin="anonymous">';
    }
    html += '</div>';
    html += '<div class="comparison-arrow">→</div>';
    html += '<div class="comparison-side">';
    if (afterPhoto) {
        html += afterDate ? '<div class="card-date-badge centered">' + escapeHtml(afterDate) + '</div>' : '';
        html += '<img src="' + getCardImageUrl(afterPhoto) + '" crossorigin="anonymous">';
    }
    html += '</div>';
    html += '</div>';
    html += '</div>';
    html += buildCardFooter();
    html += '</div>';
    return html;
}

function renderEmotionCard(card) {
    var emotions = card.emotions || (card.stats && card.stats.emotions) || [];
    var dominant = card.dominant_emotion || (card.stats && card.stats.dominant_emotion) || null;
    var html = '<div class="growth-card emotion-weather-card">';
    html += '<div class="card-content">';
    html += '<div class="card-title">' + escapeHtml(card.title || '情绪天气') + '</div>';
    html += '<div class="card-text">' + escapeHtml(card.subtitle || card.content || '') + '</div>';
    if (emotions.length) {
        html += '<div class="emotion-weather-list">' + emotions.map(function(e) {
            var pct = Number(e.percentage || 0);
            return '<div class="emotion-weather-item">'
                + '<span class="emotion-icon">' + escapeHtml(e.icon || '🌤️') + '</span>'
                + '<span class="emotion-name">' + escapeHtml(e.emotion || '情绪') + '</span>'
                + '<span class="emotion-bar"><span class="emotion-bar-fill" style="width:' + Math.max(0, Math.min(100, pct)) + '%;background:' + escapeHtml(e.color || '#FF8FAB') + '"></span></span>'
                + '<span class="emotion-percent">' + escapeHtml(String(pct)) + '%</span>'
                + '</div>';
        }).join('') + '</div>';
    }
    if (dominant) {
        html += '<div class="emotion-dominant">' + escapeHtml('最常见：' + (dominant.emotion || '未知') + ' · ' + (dominant.percentage || 0) + '%') + '</div>';
    }
    html += '<div class="card-highlight">' + escapeHtml(card.content || '') + '</div>';
    html += '</div>';
    html += buildCardFooter();
    html += '</div>';
    return html;
}

function renderYearCompareCard(card) {
    var photos = card.assets && Array.isArray(card.assets.year_samples) ? card.assets.year_samples : (card.year_samples || []);
    var html = '<div class="growth-card">';
    html += '<div class="card-content">';
    html += '<div class="card-title">' + escapeHtml(card.title || '同一天不同年') + '</div>';
    html += '<div class="card-text">' + escapeHtml(card.subtitle || card.content || '') + '</div>';
    if (photos.length) {
        html += '<div class="year-sample-list">' + photos.slice(0, 6).map(function(sample) {
            var photo = sample.photo || sample;
            var path = typeof photo === 'string' ? photo : (photo.path || '');
            var year = sample.year || (sample.photo && sample.photo.year) || sample.label || '';
            return '<div class="year-sample-item"><img src="' + getCardImageUrl(path) + '" crossorigin="anonymous"><div class="year-badge">' + escapeHtml(year) + '</div></div>';
        }).join('') + '</div>';
    }
    html += '</div>';
    html += buildCardFooter();
    html += '</div>';
    return html;
}

function renderSeasonCard(card) {
    var seasons = card.assets && Array.isArray(card.assets.seasons) ? card.assets.seasons : (card.seasons || []);
    var html = '<div class="growth-card">';
    html += '<div class="card-content">';
    html += '<div class="card-title">' + escapeHtml(card.title || '四季衣橱') + '</div>';
    html += '<div class="card-text">' + escapeHtml(card.subtitle || card.content || '') + '</div>';
    if (seasons.length) {
        html += '<div class="season-list">' + seasons.map(function(season) {
            return '<span class="season-pill">' + escapeHtml((season.emoji || '') + ' ' + (season.season || season.name || '')) + ' · ' + escapeHtml(String(season.count || 0)) + '张</span>';
        }).join('') + '</div>';
    }
    html += renderGridPhotos(card, 6);
    html += '</div>';
    html += buildCardFooter();
    html += '</div>';
    return html;
}

function renderExpressionCard(card) {
    var assets = card.assets || {};
    var photos = getCardPhotos(card);
    var firstPhoto = assets.before_photo || card.before_photo || (photos[0] && (photos[0].path || photos[0].photo || photos[0])) || '';
    var secondPhoto = assets.after_photo || card.after_photo || (photos[1] && (photos[1].path || photos[1].photo || photos[1])) || '';
    var firstLabel = assets.before_label || formatCardDate(card.before_date || '');
    var secondLabel = assets.after_label || formatCardDate(card.after_date || '');
    var monthsDiff = card.months_diff || assets.months_diff || '';
    var html = '<div class="growth-card">';
    html += '<div class="card-content">';
    html += '<div class="card-title">' + escapeHtml(card.title || '表情模仿秀') + '</div>';
    html += '<div class="card-text">' + escapeHtml(card.subtitle || card.content || '') + '</div>';
    html += '<div class="expression-compare">';
    if (firstPhoto) {
        html += '<div class="compare-item"><div class="compare-label">' + escapeHtml(firstLabel || '早期') + '</div><img src="' + getCardImageUrl(firstPhoto) + '" crossorigin="anonymous"></div>';
    }
    html += '<div class="compare-arrow">→</div>';
    if (secondPhoto) {
        html += '<div class="compare-item"><div class="compare-label">' + escapeHtml(secondLabel || '近期') + '</div><img src="' + getCardImageUrl(secondPhoto) + '" crossorigin="anonymous"></div>';
    }
    html += '</div>';
    if (monthsDiff !== '') {
        html += '<div class="card-stats-row"><span class="card-stat-pill">' + escapeHtml(String(monthsDiff)) + '个月的变化</span></div>';

    html += '<div class="story-info-panel" style="margin-top:16px;">';
    html += '<div class="story-panel-title">近期气候</div>';
    html += '<div class="card-text" style="margin:0 0 10px 0;">' + escapeHtml(card.content || heroArchetype) + '</div>';
    if (moodMix.length) {
        html += '<div class="story-weather-mix">' + moodMix.map(function(item) {
            var pct = Number(item.percentage || 0);
            return '<div class="story-weather-row"><span class="story-weather-name">' + escapeHtml(item.emotion || '') + '</span><span class="story-weather-bar"><span class="story-weather-fill" style="width:' + Math.max(0, Math.min(100, pct)) + '%;"></span></span><span class="emotion-percent">' + escapeHtml(String(pct)) + '%</span></div>';
        }).join('') + '</div>';
    }
    html += '</div>';
    html += '</div>';
    html += buildCardFooter();
    html += '</div>';
    return html;
}

function renderStoryUpdateCard(card) {
    var assets = card.assets || {};
    var coverPhoto = assets.cover_photo || (card.photo_paths && card.photo_paths[0]) || '';
    var beforeText = assets.before_text || card.before_text || '';
    var afterText = assets.after_text || card.after_text || '';
    var feedbackHint = assets.feedback_hint || card.feedback_hint || '';
    var html = '<div class="growth-card story-card">';
    html += '<div class="card-content">';
    html += '<div class="card-title">' + escapeHtml(card.title || '画像更新卡') + '</div>';
    html += '<div class="card-text">' + escapeHtml(card.subtitle || '') + '</div>';
    if (coverPhoto) {
        html += '<div class="annotation-card-photo"><img src="' + getCardImageUrl(coverPhoto) + '" crossorigin="anonymous"></div>';
    }
    html += '<div class="story-update-shell">';
    html += '<div class="story-update-block"><div class="story-update-label">AI之前更容易这样理解</div><div class="card-text" style="margin:0;">' + escapeHtml(beforeText) + '</div></div>';
    html += '<div class="story-update-block"><div class="story-update-label">家长补充后，现在更像</div><div class="card-text" style="margin:0;">' + escapeHtml(afterText) + '</div></div>';
    if (feedbackHint) {
        html += '<div class="story-update-block"><div class="story-update-label">这次补充的关键信息</div><div class="card-text" style="margin:0;">' + escapeHtml(feedbackHint) + '</div></div>';
    }
    html += '</div>';
    html += '</div>';
    html += buildCardFooter();
    html += '</div>';
    return html;
}

function renderCareGuideCard(card) {
    var assets = card.assets || {};
    var coverPhoto = assets.cover_photo || (card.photo_paths && card.photo_paths[0]) || '';
    var items = assets.guide_items || card.guide_items || [];
    var sceneLabel = assets.scene_label || card.scene_label || '';
    var html = '<div class="growth-card story-card">';
    html += '<div class="card-content">';
    html += '<div class="card-title">' + escapeHtml(card.title || '使用说明书') + '</div>';
    html += '<div class="card-text">' + escapeHtml(card.subtitle || '') + '</div>';
    if (coverPhoto) {
        html += '<div class="annotation-card-photo">';
        html += sceneLabel ? '<div class="card-date-badge centered">' + escapeHtml(sceneLabel) + '</div>' : '';
        html += '<img src="' + getCardImageUrl(coverPhoto) + '" crossorigin="anonymous"></div>';
    }
    html += '<div class="care-guide-list">';
    html += items.map(function(item) {
        return '<div class="care-guide-item"><div class="care-guide-item-title">' + escapeHtml(item.label || '') + '</div><div class="card-text" style="margin:0;">' + escapeHtml(item.text || '') + '</div></div>';
    }).join('');
    html += '</div>';
    html += '</div>';
    html += buildCardFooter();
    html += '</div>';
    return html;
}

function renderMultiPhotoCard(card) {
    var html = '<div class="growth-card">';
    html += '<div class="card-content">';
    html += '<div class="card-title">' + escapeHtml(card.title || '成长卡片') + '</div>';
    html += '<div class="card-text">' + escapeHtml(card.subtitle || card.content || '') + '</div>';
    html += renderGridPhotos(card, 6);
    html += '</div>';
    html += buildCardFooter();
    html += '</div>';
    return html;
}

function buildCardFooter() {
    return '<div class="card-footer"><div class="card-footer-text"><button onclick="shareCard()" style="background:none;border:none;color:#FF8FAB;cursor:pointer;font-size:12px;padding:0;"><i class="fas fa-share-alt"></i> 分享</button></div><div class="card-brand">mumu成长日志系统 mumu.ftir.fun</div></div>';
}

function renderPhotoGrid(photoPaths, maxPhotos) {
    maxPhotos = maxPhotos || 6;
    if (!photoPaths || photoPaths.length === 0) return '';
    var photos = photoPaths.slice(0, maxPhotos);
    var photoHtml = photos.map(function(path) {
        var thumbUrl = getCardImageUrl(path);
        return '<img src="' + thumbUrl + '" style="width:100%;height:auto;object-fit:cover;border-radius:8px;">';
    }).join('');
    return '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:16px;">' + photoHtml + '</div>';
}

function renderDailyGrowthCard(card) {
    var cardEl = document.getElementById('currentCard');
    var cardType = card.type || 'default_card';
    var layout = card.layout || '';
    var cardHtml = '';
    
    console.log('[Card] 渲染:', cardType, 'photo:', card.photo);
    
    if (layout === 'tag_collage' || cardType === 'tag_collage_card' || cardType === 'collage_card') {
        cardHtml = renderTagCollageCard(card);
    } else if (layout === 'album_timeline' || cardType === 'time_album_card') {
        cardHtml = renderTimeAlbumCard(card);
    } else if (layout === 'generated_comic' || cardType === 'generated_comic_card') {
        cardHtml = renderGeneratedComicCard(card);
    } else if (layout === 'virtual_role' || cardType === 'virtual_role_card') {
        cardHtml = renderVirtualRoleCard(card);
    } else if (layout === 'story_profile' || cardType === 'story_character_card') {
        cardHtml = renderStoryCharacterCard(card);
    } else if (layout === 'story_cover' || cardType === 'story_episode_card') {
        cardHtml = renderStoryEpisodeCard(card);
    } else if (layout === 'quote_spotlight' || cardType === 'story_quote_card') {
        cardHtml = renderStoryQuoteCard(card);
    } else if (layout === 'skill_badge' || cardType === 'story_skill_card') {
        cardHtml = renderStorySkillCard(card);
    } else if (layout === 'story_weather' || cardType === 'story_weather_card') {
        cardHtml = renderStoryWeatherCard(card);
    } else if (layout === 'story_update' || cardType === 'story_update_card') {
        cardHtml = renderStoryUpdateCard(card);
    } else if (layout === 'care_guide' || cardType === 'care_guide_card') {
        cardHtml = renderCareGuideCard(card);
    } else if (layout === 'comparison' || cardType === 'comparison_card') {
        cardHtml = renderComparisonCard(card);
    } else if (layout === 'year_compare' || cardType === 'same_day_different_year_card') {
        cardHtml = renderYearCompareCard(card);
    } else if (layout === 'season_gallery' || cardType === 'four_seasons_wardrobe_card') {
        cardHtml = renderSeasonCard(card);
    } else if (cardType === 'emotion_weather_card') {
        cardHtml = renderEmotionCard(card);
    } else if (cardType === 'user_annotation_card') {
        cardHtml = renderUserAnnotationCard(card);
    } else if (layout === 'stats_only' || cardType === 'companion_stats_card' || cardType === 'data_portrait_card') {
        cardHtml = renderStatsCard(card);
    } else if (cardType === 'expression_mimic_card') {
        cardHtml = renderExpressionCard(card);
    } else if (layout === 'photo_grid' || cardType === 'smile_collection_card' || cardType === 'little_traveler_card' || cardType === 'sleep_evolution_card' || cardType === 'love_hug_card' || cardType === 'sleep_pose_collection_card' || cardType === 'home_to_world_card') {
        cardHtml = renderMultiPhotoCard(card);
    } else if (card.photo) {
        var photoUrl = getCardImageUrl(card.photo);
        cardHtml = '<div class="growth-card"><img src="' + photoUrl + '" style="width:100%;border-radius:12px;" crossorigin="anonymous"><div class="card-content"><div class="card-title">' + escapeHtml(card.title || '成长瞬间') + '</div><div class="card-text">' + escapeHtml(card.subtitle || card.content || '') + '</div></div>' + buildCardFooter() + '</div>';
    }
    // 默认卡片
    else {
        cardHtml = '<div class="growth-card"><div class="card-content"><div class="card-title">' + escapeHtml(card.title || '成长卡片') + '</div><div class="card-text">' + escapeHtml(card.content || '') + '</div></div>' + buildCardFooter() + '</div>';
    }
    
    if (cardEl) {
        cardEl.innerHTML = cardHtml;
        // 预生成分享图片
        pregenerateCanvas(cardEl);
    }
}

function pregenerateCanvas(cardEl) {
    if (typeof html2canvas === 'undefined') {
        console.log('[Card] html2canvas未加载');
        return;
    }
    html2canvas(cardEl, {
        scale: 2,
        backgroundColor: '#ffffff',
        useCORS: true,
        allowTaint: true,
        logging: false,
        imageTimeout: 15000,
        onclone: function(clonedDoc) {
            var clonedImages = clonedDoc.querySelectorAll('img');
            clonedImages.forEach(function(img) {
                img.crossOrigin = 'anonymous';
            });
        }
    }).then(function(canvas) {
        pregeneratedCanvas = canvas;
        console.log('[Card] 分享图片预生成完成');
    }).catch(function(err) {
        console.error('[Card] 预生成图片失败:', err);
    });
}

async function loadCards(category, shouldUpdateUrl) {
    try {
        var targetCategory = category || currentCategory || 'all';
        console.log('[Card] 开始加载分类:', targetCategory);
        
        const controller = new AbortController();
        const timeoutId = setTimeout(function() { controller.abort(); }, 60000);

        const query = targetCategory && targetCategory !== 'all'
            ? ('?category=' + encodeURIComponent(targetCategory))
            : '';
        const resp = await fetch('/api/card/cache/list' + query, {
            signal: controller.signal
        });
        
        clearTimeout(timeoutId);
        
        if (!resp.ok) {
            console.error('[Card] API响应错误:', resp.status, resp.statusText);
            showError('API请求失败: ' + resp.status + ' ' + resp.statusText);
            return;
        }
        
        const data = await resp.json();
        console.log('[Card] API响应: success=' + data.success + ', total=' + data.total + ', category=' + data.category);
        
        if (data.success) {
            allCards = data.cards || [];
            currentCategory = data.category || targetCategory;
            if (Array.isArray(data.category_counts) && data.category_counts.length) {
                cardCategoryCounts = data.category_counts;
            }
            currentCardIndex = 0;
            renderCategoryTabs();
            if (shouldUpdateUrl !== false) {
                updateCategoryUrl(currentCategory);
            }
            if (allCards.length > 0) {
                updateUI();
                renderCard(currentCardIndex);
            } else {
                console.log('[Card] 当前分类无卡片');
                showNoCards();
            }
        } else {
            showError(data.message || '卡片加载失败');
        }
    } catch (e) {
        console.error('[Card] 加载失败:', e);
        if (e.name === 'AbortError') {
            showError('请求超时，请检查客户端是否运行');
        } else if (e.message && e.message.includes('Failed to fetch')) {
            showError('无法连接到服务器，请确保客户端正在运行');
        } else {
            showError('加载失败: ' + e.message);
        }
    }
}

function showError(message) {
    document.getElementById('currentCard').innerHTML = '<div class="no-cards"><i class="fas fa-exclamation-triangle"></i><h3>加载失败</h3><p style="font-size: 0.9rem; margin-top: 10px; color: #e53e3e;">' + message + '</p></div>';
    document.getElementById('prevBtn').disabled = true;
    document.getElementById('nextBtn').disabled = true;
    document.getElementById('cardCount').textContent = '0';
    renderCategoryTabs();
}

function updateUI() {
    document.getElementById('cardCount').textContent = allCards.length;
    document.getElementById('prevBtn').disabled = allCards.length <= 1;
    document.getElementById('nextBtn').disabled = allCards.length <= 1;
    
    var dots = '';
    for (var i = 0; i < allCards.length; i++) {
        dots += '<div class="page-dot ' + (i === currentCardIndex ? 'active' : '') + '" onclick="goToCard(' + i + ')"></div>';
    }
    document.getElementById('cardPagination').innerHTML = dots;
}

function renderCard(idx) {
    if (idx >= 0 && idx < allCards.length) {
        renderDailyGrowthCard(allCards[idx]);
    }
}

function changeCard(dir) {
    if (allCards.length <= 1) return;
    
    var newIdx = currentCardIndex + dir;
    
    if (newIdx < 0) {
        currentCardIndex = allCards.length - 1;
    } else if (newIdx >= allCards.length) {
        currentCardIndex = 0;
    } else {
        currentCardIndex = newIdx;
    }
    
    updateUI();
    renderCard(currentCardIndex);
}

function goToCard(idx) {
    if (idx >= 0 && idx < allCards.length) {
        currentCardIndex = idx;
        updateUI();
        renderCard(currentCardIndex);
    }
}

function showNoCards() {
    var current = getCategoryMeta(currentCategory);
    document.getElementById('currentCard').innerHTML = '<div class="no-cards"><i class="fas fa-images"></i><h3>这个分类还没有卡片</h3><p style="font-size: 0.9rem; margin-top: 10px; color: #718096;">' + escapeHtml(current.description || '卡片会在后台自动同步，稍后刷新即可看到内容。') + '</p></div>';
    document.getElementById('prevBtn').disabled = true;
    document.getElementById('nextBtn').disabled = true;
    document.getElementById('cardCount').textContent = '0';
    document.getElementById('cardPagination').innerHTML = '';
    renderCategoryTabs();
}

// 分享功能 - 使用html2canvas生成图片
function shareCard() {
    var card = document.getElementById('currentCard');
    if (!card) return;
    
    // 标记卡片已分享
    if (allCards[currentCardIndex] && allCards[currentCardIndex].id) {
        markCardShared(allCards[currentCardIndex].id);
    }
    
    // 如果图片已预生成，直接使用
    if (pregeneratedCanvas) {
        showImagePreview(pregeneratedCanvas);
        return;
    }
    
    // 否则显示加载提示并生成
    console.log('[Card] 正在生成分享图片...');
    
    if (typeof html2canvas === 'undefined') {
        alert('图片生成组件未加载，请刷新页面重试');
        return;
    }
    
    generateAndShare(card);
}

function generateAndShare(card) {
    html2canvas(card, {
        scale: 2,
        backgroundColor: '#ffffff',
        useCORS: true,
        allowTaint: true,
        logging: false,
        imageTimeout: 15000,
        onclone: function(clonedDoc) {
            var clonedImages = clonedDoc.querySelectorAll('img');
            clonedImages.forEach(function(img) {
                img.crossOrigin = 'anonymous';
            });
        }
    }).then(function(canvas) {
        pregeneratedCanvas = canvas;
        showImagePreview(canvas);
    }).catch(function(err) {
        console.error('[Card] 生成图片失败:', err);
        alert('生成图片失败，请重试');
    });
}

function showImagePreview(canvas) {
    var modal = document.getElementById('imagePreviewModal');
    var img = document.getElementById('previewImage');
    var tip = document.getElementById('previewTip');
    var downloadBtn = document.getElementById('downloadBtn');
    
    img.src = canvas.toDataURL('image/png');
    
    // 检测是否为移动端
    var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    
    if (isMobile) {
        tip.textContent = '长按图片保存到手机';
        tip.style.display = 'block';
        downloadBtn.style.display = 'none';
    } else {
        tip.style.display = 'none';
        downloadBtn.style.display = 'inline-block';
    }
    
    modal.classList.add('show');
}

function closeImagePreview() {
    document.getElementById('imagePreviewModal').classList.remove('show');
}

function downloadImage() {
    if (!pregeneratedCanvas) return;
    
    var link = document.createElement('a');
    var card = allCards[currentCardIndex];
    var filename = '成长卡片_' + (card ? (card.title || 'card') : 'card') + '_' + Date.now() + '.png';
    
    link.download = filename;
    link.href = pregeneratedCanvas.toDataURL('image/png');
    link.click();
    
    closeImagePreview();
}

function markCardShared(cardId) {
    if (!cardId) return;
    
    fetch('/api/card/share', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ card_id: cardId })
    }).then(function(resp) {
        return resp.json();
    }).then(function(data) {
        if (data && data.success) {
            console.log('[Card] 已标记为已分享');
            var card = allCards.find(function(c) { return c.id === cardId; });
            if (card) card.shared = true;
        }
    }).catch(function(err) {
        console.error('[Card] 标记分享失败:', err);
    });
}

// 点击背景关闭预览
document.getElementById('imagePreviewModal').addEventListener('click', function(e) {
    if (e.target === this) {
        closeImagePreview();
    }
});

// 页面加载完成
document.addEventListener('DOMContentLoaded', function() {
    console.log('[Card] 页面加载完成');
    renderCategoryTabs();
    if (Array.isArray(window.__CARDS__) && window.__CARDS__.length > 0) {
        allCards = window.__CARDS__;
        currentCardIndex = 0;
        updateUI();
        renderCard(currentCardIndex);
    } else {
        showNoCards();
    }
    loadCards(currentCategory, false);
});
</script>
