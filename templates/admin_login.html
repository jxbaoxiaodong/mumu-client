<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site_title|default("成长记录系统") }} - 管理员登录</title>
    <link href="/static/vendor/bootstrap/bootstrap-5.3.0.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/admin-style.css">
    <style>
        /* 内联样式 */
        body {
            background: linear-gradient(135deg, var(--admin-primary) 0%, var(--admin-primary-light) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: var(--admin-card);
            border-radius: var(--admin-radius);
            padding: 40px;
            box-shadow: 0 20px 60px rgba(255, 154, 139, 0.3);
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--admin-border);
            animation: fade-in 0.6s ease-out;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h1 {
            color: var(--admin-primary);
            font-size: 2rem;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .login-header p {
            color: var(--admin-text-light);
            font-size: 0.95rem;
            opacity: 0.8;
        }
        .form-control {
            padding: 14px 18px;
            border-radius: 12px;
            border: 2px solid rgba(255, 154, 139, 0.2);
            transition: all 0.3s ease;
            background: white;
            font-size: 0.95rem;
        }
        .form-control:focus {
            border-color: var(--admin-primary);
            box-shadow: 0 0 0 4px rgba(255, 154, 139, 0.15);
        }
        .btn-login {
            background: linear-gradient(135deg, var(--admin-primary), var(--admin-primary-light));
            color: white;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s ease;
            font-size: 1rem;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 154, 139, 0.3);
            background: linear-gradient(135deg, var(--admin-primary-light), var(--admin-primary));
        }
        .alert {
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 20px;
            border: none;
            background: rgba(255, 154, 139, 0.1);
            color: var(--admin-text);
        }
        .footer {
            text-align: center;
            margin-top: 25px;
            color: var(--admin-text-light);
            font-size: 0.85rem;
            opacity: 0.8;
        }
        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h1>🔐 管理员登录</h1>
            <p>{{ site_title|default("成长记录系统管理后台") }}</p>
        </div>
        
        {% if error %}
        <div class="alert alert-danger">
            {{ error }}
        </div>
        {% endif %}
        
        <form method="post" action="/mumu-gate-7k2p9x/login">
            <div class="mb-3">
                <label for="password" class="form-label">管理员密码</label>
                <input type="password" class="form-control" id="password" name="password" 
                       placeholder="请输入管理员密码" required>
                <div class="form-text">请输入当前已配置的管理员密码</div>
            </div>
            
            <button type="submit" class="btn-login">登录</button>
        </form>
        
        <div class="footer">
            <p>© 2026 成长记录系统</p>
            <p>版本: 2.0-with-admin</p>
        </div>
    </div>
    
    <script src="/static/vendor/bootstrap/bootstrap-5.3.0.bundle.min.js"></script>
</body>
</html>
