name: Build CZRZ Client

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Download cloudflared
      run: |
        Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile "cloudflare.exe"

    - name: Build executable
      run: |
        pyinstaller czrz_client.spec --clean

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: CZRZClient-Windows
        path: dist/CZRZClient.exe

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Download cloudflared
      run: |
        curl -L -o cloudflared "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-darwin-amd64"
        chmod +x cloudflared

    - name: Build executable
      run: |
        pyinstaller czrz_client.spec --clean

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: CZRZClient-macOS
        path: dist/CZRZClient

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libnotify-dev libsdl2-dev

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Download cloudflared
      run: |
        curl -L -o cloudflared "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64"
        chmod +x cloudflared

    - name: Build executable
      run: |
        pyinstaller czrz_client.spec --clean

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: CZRZClient-Linux
        path: dist/CZRZClient

  create-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write

    steps:
    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: CZRZClient-Windows
        path: release/CZRZClient-Windows

    - name: Download macOS artifact
      uses: actions/download-artifact@v4
      with:
        name: CZRZClient-macOS
        path: release/CZRZClient-macOS

    - name: Download Linux artifact
      uses: actions/download-artifact@v4
      with:
        name: CZRZClient-Linux
        path: release/CZRZClient-Linux

    - name: Create zip files
      run: |
        cd release
        zip -r CZRZClient-Windows.zip CZRZClient-Windows
        zip -r CZRZClient-macOS.zip CZRZClient-macOS
        zip -r CZRZClient-Linux.zip CZRZClient-Linux

    - name: Create release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: Release ${{ github.run_number }}
        body: |
          自动构建发布

          ## 下载说明
          - Windows: 下载 CZRZClient-Windows.zip
          - macOS: 下载 CZRZClient-macOS.zip
          - Linux: 下载 CZRZClient-Linux.zip
        files: |
          release/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}