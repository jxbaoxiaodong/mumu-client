name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: CZRZClient-Windows
          - os: ubuntu-latest
            artifact: CZRZClient-Linux
          - os: macos-latest
            artifact: CZRZClient-macOS

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install flask werkzeug requests Pillow jinja2 python-dateutil zhdate beautifulsoup4 lxml pydub imageio-ffmpeg

      - name: Prepare cloudflared (Windows)
        if: runner.os == 'Windows'
        run: |
          copy cloudflared-windows.exe cloudflare.exe

      - name: Prepare cloudflared (Linux)
        if: runner.os == 'Linux'
        run: |
          cp cloudflared-linux cloudflared
          chmod +x cloudflared

      - name: Prepare cloudflared (macOS)
        if: runner.os == 'macOS'
        run: |
          cp cloudflared-darwin cloudflared
          chmod +x cloudflared

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --name="CZRZClient" --onefile --console --add-data="templates;templates" --add-data="static;static" --add-data="cloudflare.exe;." --hidden-import=flask --hidden-import=flask.json --hidden-import=werkzeug --hidden-import=werkzeug.security --hidden-import=jinja2 --hidden-import=requests --hidden-import=PIL --hidden-import=PIL.Image --hidden-import=dateutil --hidden-import=dateutil.parser --hidden-import=zhdate --hidden-import=zhdate.zh_date --hidden-import=bs4 --hidden-import=lxml --hidden-import=pydub --hidden-import=imageio_ffmpeg --exclude-module=matplotlib --exclude-module=numpy --exclude-module=pandas --exclude-module=scipy --exclude-module=tkinter --clean --noconfirm client.py

      - name: Build with PyInstaller (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          pyinstaller --name="CZRZClient" --onefile --console --add-data="templates:templates" --add-data="static:static" --add-data="cloudflared:." --hidden-import=flask --hidden-import=flask.json --hidden-import=werkzeug --hidden-import=werkzeug.security --hidden-import=jinja2 --hidden-import=requests --hidden-import=PIL --hidden-import=PIL.Image --hidden-import=dateutil --hidden-import=dateutil.parser --hidden-import=zhdate --hidden-import=zhdate.zh_date --hidden-import=bs4 --hidden-import=lxml --hidden-import=pydub --hidden-import=imageio_ffmpeg --exclude-module=matplotlib --exclude-module=numpy --exclude-module=pandas --exclude-module=scipy --exclude-module=tkinter --clean --noconfirm client.py

      - name: Create package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir release
          copy dist\CZRZClient.exe release\mumu-windows.exe
          copy cloudflare.exe release\

      - name: Create package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p release
          cp dist/CZRZClient release/mumu-linux
          cp cloudflared release/cloudflared-linux

      - name: Create package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p release
          cp dist/CZRZClient release/mumu-macos
          cp cloudflared release/cloudflared-darwin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: CZRZClient-Windows
          path: release-windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: CZRZClient-Linux
          path: release-linux

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: CZRZClient-macOS
          path: release-macos

      - name: List files
        run: |
          echo "=== Windows ===" && ls -la release-windows/
          echo "=== Linux ===" && ls -la release-linux/
          echo "=== macOS ===" && ls -la release-macos/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-windows/*
            release-linux/*
            release-macos/*
